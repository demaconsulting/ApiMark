---
# Spell-Checking
#
# PURPOSE:
# - Maintain professional documentation and code quality
# - Catch spelling errors before publication
# - Support consistent technical terminology usage
# - NEVER add a misspelled word - fix the typo in the source instead
# - NEVER add a British-English spelling - correct to US-English in the source
# - PROPOSE only genuine technical terms/names as needed
version: '0.2'
language: en
words:
  - apimark
  - ApiMark
  - buildmark
  - Cecil
  - csproj
  - cstddef
  - declspec
  - Dema
  - dllexport
  - docstrings
  - fileassert
  - frontmatter
  - GHDL
  - hrefs
  - isysroot
  - isystem
  - libc
  - libclang
  - libclangsharp
  - libext
  - linkified
  - Linkification
  - Linkify
  - linkify
  - misattributed
  - msbuild
  - MSBuild
  - msvc
  - mylib
  - MYLIB
  - NDEBUG
  - netstandard
  - Pandoc
  - parameterless
  - pasteable
  - postconditions
  - reqstream
  - reviewmark
  - runtimeconfig
  - sarif
  - sarifmark
  - slnx
  - stdarg
  - stddef
  - sonar
  - sonarmark
  - subclassable
  - constexpr
  - cppreference
  - fparse
  - fsyntax
  - versionmark
  - writability
  - VHDL
  - vswhere
  - Weasyprint
  - xcrun
  - Xclang
  - xunit
  - Xunit
  - yamlfix
ignorePaths:
  - '**/.git/**'
  - '**/node_modules/**'
  - '**/.venv/**'
  - '**/thirdparty/**'
  - '**/third-party/**'
  - '**/3rd-party/**'
  - '**/.agent-logs/**'
  - '**/bin/**'
  - '**/obj/**'
  - '**/generated/**'
  - '**/packages/**'
  - package-lock.json
