---
# CppEmitterSingleFile unit requirements
sections:
  - title: ApiMarkCpp Requirements
    sections:
      - title: CppEmitterSingleFile Requirements
        requirements:
          - id: ApiMarkCpp-CppEmitterSingleFile
            title: >-
              CppEmitterSingleFile shall write all API documentation into a single
              api.md file using hierarchical heading levels.
            justification: |
              Single-file output is required for consumers who want a compact, linear
              reference instead of the gradual-disclosure folder tree. Writing all
              content into one file simplifies indexing and search.
            children:
              - ApiMarkCpp-CppEmitterSingleFile-CreatesSingleApiWriter
              - ApiMarkCpp-CppEmitterSingleFile-EmitsLibraryNameHeading
              - ApiMarkCpp-CppEmitterSingleFile-EmitsNamespaceHeading
              - ApiMarkCpp-CppEmitterSingleFile-EmitsClassSection
              - ApiMarkCpp-CppEmitterSingleFile-EmitsFreeFunctionSection
              - ApiMarkCpp-CppEmitterSingleFile-EmitsEnumSection
              - ApiMarkCpp-CppEmitterSingleFile-EmitsMemberSection
              - ApiMarkCpp-CppEmitterSingleFile-EmitsTypeAliasSection
              - ApiMarkCpp-CppEmitterSingleFile-EmitsClassScopedTypeAliasSection
            tests:
              - CppEmitterSingleFile_Emit_MinimalData_CreatesExactlyOneWriter
          - id: ApiMarkCpp-CppEmitterSingleFile-CreatesSingleApiWriter
            title: >-
              CppEmitterSingleFile shall create exactly one writer keyed as api.
            justification: |
              A single output file with a deterministic key is required for tool-chain
              consumers that process the file programmatically.
            tests:
              - CppEmitterSingleFile_Emit_MinimalData_CreatesExactlyOneWriter
              - CppEmitterSingleFile_Emit_MinimalData_CreatesApiFileOnly
          - id: ApiMarkCpp-CppEmitterSingleFile-EmitsLibraryNameHeading
            title: CppEmitterSingleFile shall emit the library name as the top-level heading in the form "{LibraryName} API Reference".
            justification: |
              The single-file document must identify the documented library immediately.
            tests:
              - CppEmitterSingleFile_Emit_MinimalData_ApiFileContainsLibraryNameHeading
          - id: ApiMarkCpp-CppEmitterSingleFile-EmitsNamespaceHeading
            title: CppEmitterSingleFile shall emit a namespace heading for each documented namespace.
            justification: |
              Namespace headings preserve structural navigation in the linear document.
            tests:
              - CppEmitterSingleFile_Emit_MinimalData_ApiFileContainsNamespaceHeading
          - id: ApiMarkCpp-CppEmitterSingleFile-EmitsClassSection
            title: CppEmitterSingleFile shall emit a section for each documented class.
            justification: |
              Class sections keep type-level information discoverable in single-file output.
            tests:
              - CppEmitterSingleFile_Emit_ClassData_ContainsClassSection
          - id: ApiMarkCpp-CppEmitterSingleFile-EmitsFreeFunctionSection
            title: CppEmitterSingleFile shall emit a section for each documented free function.
            justification: |
              Free functions must remain directly navigable in the single-file layout.
            tests:
              - CppEmitterSingleFile_Emit_FreeFunction_ContainsFreeFunctionSection
          - id: ApiMarkCpp-CppEmitterSingleFile-EmitsEnumSection
            title: CppEmitterSingleFile shall emit a section for each documented enum.
            justification: |
              Enum pages in gradual disclosure correspond to explicit enum sections in the
              single-file layout.
            tests:
              - CppEmitterSingleFile_Emit_Enum_ContainsEnumSection
          - id: ApiMarkCpp-CppEmitterSingleFile-EmitsMemberSection
            title: >-
              CppEmitterSingleFile shall emit individual member headings below the owning
              class section using the configured heading-depth offset.
            justification: |
              Member sections preserve drill-down detail while keeping the document linear.
            tests:
              - CppEmitterSingleFile_Emit_NonDefaultHeadingDepth_OffsetsHeadings
          - id: ApiMarkCpp-CppEmitterSingleFile-EmitsTypeAliasSection
            title: CppEmitterSingleFile shall emit a section for each documented namespace-level type alias.
            justification: |
              Type alias pages in gradual disclosure correspond to explicit type alias sections
              in the single-file layout. Without rendering type aliases the single-file output
              would be incomplete and omit documented API surface.
            tests:
              - CppEmitterSingleFile_Emit_TypeAlias_ContainsTypeAliasSection
          - id: ApiMarkCpp-CppEmitterSingleFile-EmitsClassScopedTypeAliasSection
            title: CppEmitterSingleFile shall emit class-scoped type alias sub-entries below the owning class section at H{depth+3}.
            justification: |
              Class-scoped type aliases are part of the class API surface. Without rendering
              them in single-file output, AI agents would have no visibility of class-level
              using declarations such as size_type.
            tests:
              - CppEmitterSingleFile_Emit_ClassScopedTypeAlias_ContainsAliasSubEntry
