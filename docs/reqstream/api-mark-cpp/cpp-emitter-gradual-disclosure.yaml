---
# CppEmitterGradualDisclosure unit requirements
sections:
  - title: ApiMarkCpp Requirements
    sections:
      - title: CppEmitterGradualDisclosure Requirements
        requirements:
          - id: ApiMarkCpp-CppEmitterGradualDisclosure
            title: >-
              CppEmitterGradualDisclosure shall write one Markdown file per namespace,
              type, and member in the gradual-disclosure multi-file format.
            justification: |
              The gradual-disclosure format allows AI agents and human readers to
              navigate from the API index to a namespace, then to a type, and finally
              to a member page without loading all content at once. Each unit of
              documentation receiving its own file makes path-based navigation
              deterministic.
            children:
              - ApiMarkCpp-CppEmitterGradualDisclosure-EmitApiIndexPage
              - ApiMarkCpp-CppEmitterGradualDisclosure-EmitNamespaceSummaryPage
              - ApiMarkCpp-CppEmitterGradualDisclosure-EmitTypePage
              - ApiMarkCpp-CppEmitterGradualDisclosure-EmitMemberDetailPage
              - ApiMarkCpp-CppEmitterGradualDisclosure-EmitFreeFunctionPage
              - ApiMarkCpp-CppEmitterGradualDisclosure-EmitEnumPage
              - ApiMarkCpp-CppEmitterGradualDisclosure-EmitTypeAliasPage
              - ApiMarkCpp-CppEmitterGradualDisclosure-EmitClassOperatorsPage
              - ApiMarkCpp-CppEmitterGradualDisclosure-EmitNamespaceOperatorsPage
            tests:
              - CppEmitterGradualDisclosure_Emit_MinimalData_CreatesApiIndexPage
          - id: ApiMarkCpp-CppEmitterGradualDisclosure-EmitApiIndexPage
            title: >-
              CppEmitterGradualDisclosure shall produce an api index page listing
              all
              namespaces with the library name as the top-level heading.
            justification: |
              The api index is the single entry point from which all other pages are
              reachable. Its existence and correct library-name heading are required for
              the navigation graph to be complete and for AI agents to identify the
              library being documented.
            tests:
              - CppEmitterGradualDisclosure_Emit_MinimalData_CreatesApiIndexPage
              - CppEmitterGradualDisclosure_Emit_MinimalData_ApiIndexContainsLibraryNameHeading
          - id: ApiMarkCpp-CppEmitterGradualDisclosure-EmitNamespaceSummaryPage
            title: >-
              CppEmitterGradualDisclosure shall produce a namespace summary page for
              each namespace.
            justification: |
              Namespace pages form the middle navigation layer between the api index and
              detailed type or free-function pages.
            tests:
              - CppEmitterGradualDisclosure_Emit_MinimalData_CreatesNamespacePage
          - id: ApiMarkCpp-CppEmitterGradualDisclosure-EmitTypePage
            title: CppEmitterGradualDisclosure shall produce a type page for each documented class.
            justification: |
              Type pages aggregate member links, nested types, aliases, and inheritance context.
            tests:
              - CppEmitterGradualDisclosure_Emit_MinimalData_CreatesTypePage
              - CppEmitterGradualDisclosure_Emit_NestedClass_CreatesNestedClassPage
          - id: ApiMarkCpp-CppEmitterGradualDisclosure-EmitMemberDetailPage
            title: >-
              CppEmitterGradualDisclosure shall produce a member detail page for each
              visible non-operator member, combining only case-insensitive collisions.
            justification: |
              Dedicated member pages make navigation deterministic while still handling
              case-collision edge cases safely.
            tests:
              - CppEmitterGradualDisclosure_Emit_MethodMember_CreatesMemberDetailPage
              - CppEmitterGradualDisclosure_Emit_CaseInsensitiveCollision_CreatesCombinedPage
          - id: ApiMarkCpp-CppEmitterGradualDisclosure-EmitFreeFunctionPage
            title: CppEmitterGradualDisclosure shall produce a detail page for each regular free function.
            justification: |
              Namespace-level free functions need stable standalone pages in the multi-file layout.
            tests:
              - CppEmitterGradualDisclosure_Emit_FreeFunction_CreatesFreeFunctionPage
          - id: ApiMarkCpp-CppEmitterGradualDisclosure-EmitEnumPage
            title: CppEmitterGradualDisclosure shall produce a detail page for each documented enum.
            justification: |
              Enum pages preserve value tables and associated documentation without
              inflating namespace pages.
            tests:
              - CppEmitterGradualDisclosure_Emit_Enum_CreatesEnumPage
          - id: ApiMarkCpp-CppEmitterGradualDisclosure-EmitTypeAliasPage
            title: >-
              CppEmitterGradualDisclosure shall produce detail pages for namespace-level
              and class-scoped type aliases.
            justification: |
              Public aliases are first-class API declarations and require stable paths.
            tests:
              - CppEmitterGradualDisclosure_Emit_TypeAlias_CreatesTypeAliasPage
          - id: ApiMarkCpp-CppEmitterGradualDisclosure-EmitClassOperatorsPage
            title: >-
              CppEmitterGradualDisclosure shall group class-scoped operators onto a
              shared operators page for the owning type.
            justification: |
              Operator names often normalize to colliding file names, so a shared page
              avoids invalid or ambiguous output paths.
            tests:
              - CppEmitterGradualDisclosure_Emit_ClassOperators_CreatesOperatorsPage
          - id: ApiMarkCpp-CppEmitterGradualDisclosure-EmitNamespaceOperatorsPage
            title: >-
              CppEmitterGradualDisclosure shall group namespace-level operators onto a
              shared namespace operators page.
            justification: |
              Namespace operator overloads need the same collision-safe grouping as class
              operators.
            tests:
              - CppGenerator_Generate_NamespaceFreeOperator_CreatesNamespaceOperatorsPage
              - CppEmitterGradualDisclosure_Emit_NamespaceOperators_CreatesOperatorsPage
