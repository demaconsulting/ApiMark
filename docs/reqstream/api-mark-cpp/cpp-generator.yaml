---
# CppGenerator unit requirements
sections:
  - title: ApiMarkCpp Requirements
    sections:
      - title: CppGenerator Requirements
        requirements:
          - id: ApiMarkCpp-CppGenerator-AcceptIncludeRootsAndParseOptions
            title: >-
              CppGenerator shall accept a configured set of public include roots and
              parse-environment
              options specifying the directories, defines, and C++ standard to use
              when parsing headers.
            justification: |
              The generator cannot produce correct C++ documentation unless it knows where the public
              headers reside (to determine ownership) and how to configure the Clang parser (to
              resolve all `#include` directives encountered during parsing).
            tests:
              - CppGenerator_Constructor_NullOptions_ThrowsArgumentNullException
              - CppGenerator_Generate_NonexistentIncludeRoot_ThrowsDirectoryNotFoundException
          - id: ApiMarkCpp-CppGenerator-ParseHeadersViaClang
            title: CppGenerator shall parse public header files via clang -ast-dump=json
              to obtain a fully resolved C++ AST.
            justification: |
              A fully resolved AST is required so that type references, template arguments, and
              inheritance relationships across headers are available for accurate documentation
              generation; invoking clang directly produces a complete, standards-compliant AST
              without requiring a bundled parser library.
            tests: [CppGenerator_Generate_ValidHeaders_CreatesApiEntrypoint]
          - id: ApiMarkCpp-CppGenerator-FilterDeclarationsByOwnership
            title: >-
              CppGenerator shall apply a file-provenance filter that documents only
              declarations whose
              source file both falls under a configured public include root and was
              selected by the
              api-headers patterns.
            justification: |
              C++ headers frequently include system and third-party headers whose declarations must
              not appear in the generated API reference. The ownership filter restricts output to
              the library's own public declarations, preventing documentation noise from unrelated
              code. When api-headers patterns are configured, the filter additionally restricts output
              to declarations whose source file was explicitly selected by those patterns — this ensures
              that transitively-included dependency headers whose paths fall under a PublicIncludeRoot
              are still excluded when they were not selected by --api-headers.
            tests:
              - CppGenerator_Generate_ValidHeaders_CreatesTypePageForSampleClass
              - CppGenerator_Generate_ApiHeaderPatterns_TransitiveInclude_ExcludesNonSelectedSymbols
          - id: ApiMarkCpp-CppGenerator-EmitDetailPageForEveryMember
            title: >-
              CppGenerator shall emit a dedicated detail page for every visible non-operator
              member
              of every documented class and free function, making navigation fully
              deterministic.
            justification: |
              All non-operator members always receive their own dedicated file so that navigation
              is fully deterministic. An AI or tool can always resolve
              {Namespace}/{TypeName}/{MemberName}.md without inspecting member content or shape.
              Exception: members whose base names collide on a case-insensitive filesystem are
              combined onto a single shared page (see
              ApiMarkCpp-CppGenerator-EmitCombinedMemberPageForCaseInsensitiveCollisions).
              Operator overloads are grouped onto a single operators.md page (see
              ApiMarkCpp-CppGenerator-GroupOperatorOverloadsOnSinglePage).
            tests:
              - CppGenerator_AllMembers_GetSeparateFiles
              - CppGenerator_Generate_MethodWithParameters_CreatesMemberPage
          - id: ApiMarkCpp-CppGenerator-EmitCombinedMemberPageForCaseInsensitiveCollisions
            title: CppGenerator shall emit a combined member page for case-insensitive
              filename collisions.
            justification: |
              On case-insensitive filesystems (Windows, macOS), two members whose names
              differ only in case would produce colliding filenames. Such members are
              combined onto a single page named after the lower-invariant of the shared key,
              with each member distinguished by an H4 heading showing its exact name and
              kind label. This replaces the previous _2/_3 suffix mechanism.
            tests:
              - CppGenerator_Generate_CaseCollisionClass_CreatesCombinedPage
              - CppGenerator_Generate_CaseCollisionClass_DoesNotCreateSeparateCasedPage
              - CppGenerator_Generate_CaseCollisionClass_CombinedPageContainsBothMembers
          - id: ApiMarkCpp-CppGenerator-FilterByVisibility
            title: >-
              CppGenerator shall filter class members by the configured visibility
              (Public, PublicAndProtected, All).
            justification: |
              Different consumers need different views of the same C++ class, ranging from a
              public API reference to broader internal documentation for development teams. The
              visibility filter must be applied consistently before any member page is emitted.
            tests:
              - CppGenerator_Generate_PublicVisibility_ExcludesProtectedMethod
              - CppGenerator_Generate_PublicAndProtectedVisibility_IncludesProtectedMethod
              - CppGenerator_Generate_AllVisibility_IncludesPrivateMethod
          - id: ApiMarkCpp-CppGenerator-IncludeDeprecatedApisWhenRequested
            title: >-
              CppGenerator shall exclude deprecated declarations by default and include
              them only
              when IncludeDeprecated is true.
            justification: |
              Teams sometimes need the complete historical reference output and sometimes need only
              the actively supported API surface, so deprecated declarations must be controllable
              without changing the generator code.
            tests:
              - CppGenerator_Generate_IncludeDeprecatedFalse_ExcludesDeprecatedClass
              - CppGenerator_Generate_IncludeDeprecatedTrue_IncludesDeprecatedClass
          - id: ApiMarkCpp-CppGenerator-RenderDoxygenDocComments
            title: CppGenerator shall extract and render Doxygen doc comments from parsed declarations.
            justification: |
              Developer-authored Doxygen comments contain the descriptions, parameter explanations,
              return-value documentation, and example code that belong in the published API reference.
              Without extracting these comments the generated pages contain only signatures, which is
              insufficient for an AI-readable reference. Specifically: @brief is rendered as a
              description paragraph; @param and @return are rendered in their respective sections;
              @code/@endcode blocks are rendered as fenced code blocks; missing doc comments emit a
              standard placeholder.
            tests:
              - CppGenerator_Generate_TypeWithDocComment_WritesSummaryToParagraph
              - CppGenerator_Generate_MethodWithDocComment_WritesSummaryToParagraph
              - CppGenerator_Generate_MissingDocComment_WritesPlaceholder
              - CppGenerator_Generate_MethodWithCodeExample_EmitsCodeBlockOnMemberPage
          - id: ApiMarkCpp-CppGenerator-ProduceConsistentOutputFileStructure
            title: CppGenerator shall produce output files following a consistent
              naming convention.
            justification: |
              Consistent file and folder naming allows navigation between the entrypoint,
              namespace summaries, type pages, and member detail pages without relying on a
              separate path-resolution helper or index file.
            tests:
              - CppGenerator_OutputFiles_FollowNamingConvention
              - CppGenerator_Generate_ValidHeaders_CreatesNamespacePage
              - CppGenerator_Generate_ValidHeaders_CreatesTypePageForSampleClass
          - id: ApiMarkCpp-CppGenerator-ApiMdListsAllNamespacesWithTypeCount
            title: CppGenerator shall list all namespaces in api.md with a declaration
              count column.
            justification: |
              Listing every namespace in api.md gives AI agents a complete navigation map in
              a single read. The declaration count (classes + enums + free functions) provides
              scope signal so an AI can calibrate how deeply to explore each namespace without
              opening it first.
            tests: [CppGenerator_Generate_ApiMd_ListsNamespacesWithTypeCount]
          - id: ApiMarkCpp-CppGenerator-GroupOperatorOverloadsOnSinglePage
            title: >-
              CppGenerator shall group all operator overloads for a class onto a single
              operators.md page, and all namespace-level operator free functions onto
              a single
              namespace-level operators.md page.
            justification: |
              C++ operator names such as operator+, operator<<, and operator== contain characters
              that are invalid in Windows file names. Sanitizing them to underscores causes multiple
              operators to collide on the same file name (e.g. operator+ and operator- both become
              operator_). Grouping all operators onto a fixed operators.md page eliminates the
              collision entirely and mirrors the presentation used by cppreference and Doxygen.
            tests:
              - CppGenerator_Generate_ClassWithOperators_CreatesOperatorsPage
              - CppGenerator_Generate_ClassWithOperators_OperatorsPageContainsOperatorEntry
              - CppGenerator_Generate_ClassWithOperators_TypePageLinksToOperatorsPage
              - CppGenerator_Generate_NamespaceFreeOperator_CreatesNamespaceOperatorsPage
          - id: ApiMarkCpp-CppGenerator-ShowDirectInheritanceInTypeSignature
            title: >-
              CppGenerator shall include a class declaration line in the signature block showing
              direct base class names and the final specifier for classes that have direct base
              classes or are marked final.
            justification: |
              The direct base class list tells AI agents the contract a type satisfies and
              the class it extends without requiring them to navigate to the header file.
              Combining this with the final specifier in a single declaration line keeps
              the signature block minimal and immediately scannable.
            tests:
              - CppGenerator_Generate_InheritanceClass_EmitsBaseClassInSignature
              - CppGenerator_Generate_FinalClass_EmitsFinalKeywordInSignature
          - id: ApiMarkCpp-CppGenerator-EmitIntraDocLinksInTableCells
            title: CppGenerator shall emit Markdown links in type and parameter type
              table cells when the referenced type is documented in the same library.
            justification: |
              AI agents and human readers navigating API documentation benefit from
              clickable links that jump directly to the referenced type page rather
              than requiring a separate search. Links are only emitted in table cells,
              not inside fenced code blocks, because Markdown links do not render
              inside fences.
            tests:
              - CppGenerator_Generate_IntraLibraryReturnType_EmitsMarkdownLinkInReturnsCell
          - id: ApiMarkCpp-CppGenerator-ApplyGitignoreStylePatternSelectionToHeaders
            title: >-
              CppGenerator shall apply gitignore-style last-match-wins pattern selection
              to
              determine which headers under the include roots contribute to the documented
              API
              surface when ApiHeaderPatterns is set.
            justification: |
              Projects need fine-grained control over which headers appear in the generated
              reference without changing the include roots. Gitignore-style semantics allow
              build authors to start with a broad include pattern and then selectively exclude
              or re-include specific subtrees using '!'-prefixed exclusion patterns, matching the
              familiar gitignore convention.
            tests:
              - CppGenerator_Generate_NoApiHeaderPatterns_DocumentsAllHeaders
              - CppGenerator_Generate_ApiHeaderPatterns_IncludePattern_OnlyMatchingFilesDocumented
              - CppGenerator_Generate_ApiHeaderPatterns_ExcludePattern_ExcludesMatchingFiles
              - CppGenerator_Generate_ApiHeaderPatterns_ReInclude_GitignoreSemantics_IncludesReIncludedHeader
              - CppGenerator_Generate_ApiHeaderPatterns_ExcludeWithoutReInclude_ExcludesHeader
          - id: ApiMarkCpp-CppGenerator-EmitExternalTypesSection
            title: CppGenerator shall emit an "External Types" section at the bottom
              of each generated page that references at least one non-std external
              type.
            justification: |
              Readers using an external library type documented on a page need to know
              which namespace or header to include. Collecting all external type
              references per page and listing them alphabetically provides this context
              without cluttering individual type cells with fully-qualified names.
            tests:
              - CppTypeLinkResolver_Linkify_UnknownNamespacedType_TracksExternalType
          - id: ApiMarkCpp-CppGenerator-ShowDeletedFunctionsWithDeletedNotation
            title: >-
              CppGenerator shall document explicitly deleted functions and operators
              with a
              = delete suffix in their signatures so that callers know the operation
              is
              intentionally prohibited.
            justification: |
              Explicitly deleted special members (copy constructors, assignment operators, etc.)
              communicate an intentional design decision to users of the API. Suppressing them
              would imply the operation is available; showing them with = delete makes the
              prohibition visible without requiring readers to examine the header.
            tests:
              - CppGenerator_Generate_DeletedCopyConstructor_EmitsDeleteSuffix
              - CppGenerator_Generate_DeletedCopyAssignmentOperator_EmitsDeleteSuffix
          - id: ApiMarkCpp-CppGenerator-DocumentTypeAliases
            title: >-
              CppGenerator shall document using type aliases declared in documented
              namespaces
              as first-class entries — each alias receives its own page showing
              the using
              declaration, the underlying type, and the Doxygen summary comment.
            justification: |
              A using alias is a named type in the public API, not an implementation detail.
              Documenting it with its own page allows AI agents and human readers to navigate
              to it by name and understand both the alias and its underlying type without
              inspecting header files.
            tests:
              - CppGenerator_Generate_TypeAlias_CreatesAliasPages
              - CppGenerator_Generate_TypeAliasPage_ContainsDeclarationAndSummary
              - CppGenerator_Generate_NamespacePage_ListsTypeAliases
          - id: ApiMarkCpp-CppGenerator-EmitSingleFileOutput
            title: CppGenerator shall emit a single api.md file when OutputFormat.SingleFile is selected.
            justification: |
              Single-file output is required for consumers who want a compact, linear reference
              instead of the gradual-disclosure folder tree.
            tests:
              - CppGenerator_Generate_SingleFileOutput_WritesSingleApiMarkdown
              - CppGenerator_SingleFile_MethodWithCodeExample_EmitsCodeBlock
