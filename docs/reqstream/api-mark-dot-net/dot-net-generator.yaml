---
# DotNetGenerator unit requirements
sections:
  - title: ApiMarkDotNet Requirements
    sections:
      - title: DotNetGenerator Requirements
        requirements:
          - id: ApiMarkDotNet-DotNetGenerator-AcceptAssemblyAndXmlInputs
            title: DotNetGenerator shall accept an assembly path and an XML documentation path as generator inputs.
            justification: |
              The generator cannot produce complete .NET documentation unless it can
              locate both the compiled API surface and the compiler-produced XML
              documentation that describes it.
            tests:
              - DotNetGenerator_Constructor_AcceptsAssemblyAndXmlPaths
          - id: ApiMarkDotNet-DotNetGenerator-ReadAssemblyMetadataWithoutLoading
            title: DotNetGenerator shall read type and member information from .NET assemblies without loading them into the current process.
            justification: |
              Assembly inspection must avoid loading the target library into the current
              process so documentation generation can run reliably against arbitrary
              build outputs and dependency graphs.
            tests:
              - DotNetGenerator_ReadAssembly_WithMonoCecil_ReturnsTypesAndMembers
          - id: ApiMarkDotNet-DotNetGenerator-ReadXmlDocumentationComments
            title: DotNetGenerator shall read XML documentation comments from the configured XML documentation file and include that content in generated markdown.
            justification: |
              Developer-authored summaries, remarks, parameter descriptions, returns,
              exceptions, and examples belong in the published API reference and are
              available from the XML documentation file produced by the C# compiler.
            tests:
              - DotNetGenerator_ReadXmlComments_SummaryAndRemarks_AppearInMarkdown
          - id: ApiMarkDotNet-DotNetGenerator-FilterByVisibility
            title: DotNetGenerator shall support ApiVisibility filtering for Public, PublicAndProtected, and All.
            justification: |
              Different consumers need different views of the same assembly, ranging from
              a public API reference to broader internal documentation for development.
            tests:
              - DotNetGenerator_Visibility_PublicPublicAndProtectedAll_FilterExpectedApis
          - id: ApiMarkDotNet-DotNetGenerator-IncludeObsoleteApisWhenRequested
            title: DotNetGenerator shall include obsolete APIs when IncludeObsolete is enabled and omit them when it is disabled.
            justification: |
              Teams sometimes need complete historical reference output and sometimes need
              only the actively supported API surface, so obsolete items must be controllable.
            tests:
              - DotNetGenerator_IncludeObsolete_Toggle_ControlsObsoleteOutput
          - id: ApiMarkDotNet-DotNetGenerator-EmitDetailPageForEveryMember
            title: DotNetGenerator shall emit a dedicated detail page for every visible member.
            justification: |
              All members always receive their own dedicated file so that navigation is
              fully deterministic. An AI or tool can always resolve
              {Namespace}/{TypeName}/{MemberName}.md without inspecting member content
              or shape. Exception: members whose sanitized names collide on a
              case-insensitive filesystem are combined onto a single shared page (see
              ApiMarkDotNet-DotNetGenerator-EmitCombinedMemberPageForCaseInsensitiveCollisions).
            tests:
              - DotNetGenerator_AllMembers_GetSeparateFiles
          - id: ApiMarkDotNet-DotNetGenerator-EmitCombinedMemberPageForCaseInsensitiveCollisions
            title: DotNetGenerator shall emit a combined member page for case-insensitive filename collisions.
            justification: |
              On case-insensitive filesystems (Windows, macOS), two members whose sanitized
              names differ only in case (e.g. a field 'name' and a property 'Name') would
              produce colliding filenames. To avoid data loss and maintain predictable link
              targets, such members are combined onto a single page named after the
              lower-invariant of the shared key, with each member distinguished by an H4
              heading showing its exact name and kind label.
            tests:
              - DotNetGenerator_Generate_CaseCollisionClass_CreatesCombinedPage
              - DotNetGenerator_Generate_CaseCollisionClass_DoesNotCreateSeparateCasedPage
              - DotNetGenerator_Generate_CaseCollisionClass_CombinedPageContainsBothMembers
          - id: ApiMarkDotNet-DotNetGenerator-ProduceConsistentOutputFileStructure
            title: DotNetGenerator shall produce output files following the established naming convention.
            justification: |
              Consistent file and folder naming allows navigation between the entrypoint,
              namespace summaries, type pages, and member detail pages without relying on
              a separate path-resolution helper.
            tests:
              - DotNetGenerator_OutputFiles_FollowNamingConvention
          - id: ApiMarkDotNet-DotNetGenerator-ApiMdListsAllNamespacesWithTypeCount
            title: DotNetGenerator shall list all namespaces in api.md with a direct type count column.
            justification: |
              Listing every namespace (root and child) in api.md gives AI agents a complete
              navigation map in a single read, avoiding an extra round-trip through parent
              namespace pages to discover children. The type count column provides scope
              signal so an AI can calibrate how deeply to explore each namespace without
              opening it first.
            tests:
              - DotNetGenerator_Generate_ApiMd_ListsAllNamespacesWithTypeCount
          - id: ApiMarkDotNet-DotNetGenerator-ShowDirectInheritanceInTypeSignature
            title: >-
              DotNetGenerator shall include the direct base class and directly declared
              interfaces in the type signature, omitting well-known implicit bases such as
              System.Object, System.ValueType, System.Enum, and System.MulticastDelegate.
            justification: |
              The direct inheritance list tells AI agents the contract a type satisfies and
              the class it extends without requiring them to navigate to the source file.
              Suppressing well-known implicit bases avoids noise that adds no information.
            tests:
              - DotNetGenerator_Generate_SampleImplementation_TypeSignatureShowsInterface
              - DotNetGenerator_Generate_EnumTypeSignature_HasNoBaseClass
