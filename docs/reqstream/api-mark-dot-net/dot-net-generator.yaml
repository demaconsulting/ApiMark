---
# DotNetGenerator unit requirements
sections:
  - title: ApiMarkDotNet Requirements
    sections:
      - title: DotNetGenerator Requirements
        requirements:
          - id: ApiMarkDotNet-DotNetGenerator-AcceptAssemblyAndXmlInputs
            title: DotNetGenerator shall accept an assembly path and an XML documentation
              path as generator inputs.
            justification: |
              The generator cannot produce complete .NET documentation unless it can
              locate both the compiled API surface and the compiler-produced XML
              documentation that describes it.
            tests: [DotNetGenerator_Constructor_AcceptsAssemblyAndXmlPaths]
          - id: ApiMarkDotNet-DotNetGenerator-ReadAssemblyMetadataWithoutLoading
            title: DotNetGenerator shall read type and member information from .NET
              assemblies without loading them into the current process.
            justification: |
              Assembly inspection must avoid loading the target library into the current
              process so documentation generation can run reliably against arbitrary
              build outputs and dependency graphs.
            tests: [DotNetGenerator_ReadAssembly_WithMonoCecil_ReturnsTypesAndMembers]
          - id: ApiMarkDotNet-DotNetGenerator-ReadXmlDocumentationComments
            title: DotNetGenerator shall read XML documentation comments from the
              configured XML documentation file and include that content in generated
              markdown.
            justification: |
              Developer-authored summaries, remarks, parameter descriptions, returns,
              exceptions, examples, and example code blocks belong in the published API
              reference and are available from the XML documentation file produced by
              the C# compiler. The <example> element may contain a mix of prose and
              <code> blocks; both are rendered in the output.
            tests:
              - DotNetGenerator_ReadXmlComments_SummaryAndRemarks_AppearInMarkdown
              - DotNetGenerator_Generate_ConstructorWithXmlSummary_WritesSummaryToMemberPage
              - DotNetGenerator_Generate_ConstructorWithXmlParams_WritesParamDescriptionsToMemberPage
              - DotNetGenerator_Generate_MethodWithExample_EmitsCodeBlockOnMemberPage
          - id: ApiMarkDotNet-DotNetGenerator-FilterByVisibility
            title: DotNetGenerator shall support ApiVisibility filtering for Public,
              PublicAndProtected, and All.
            justification: |
              Different consumers need different views of the same assembly, ranging from
              a public API reference to broader internal documentation for development.
            tests:
              - DotNetGenerator_Visibility_PublicPublicAndProtectedAll_FilterExpectedApis
              - DotNetGenerator_Generate_AllVisibility_IncludesPrivateMembers
          - id: ApiMarkDotNet-DotNetGenerator-IncludeObsoleteApisWhenRequested
            title: DotNetGenerator shall control obsolete API inclusion via the IncludeObsolete
              flag, including them when enabled and omitting them when disabled.
            justification: |
              Teams sometimes need complete historical reference output and sometimes need
              only the actively supported API surface, so obsolete items must be controllable.
            tests: [DotNetGenerator_IncludeObsolete_Toggle_ControlsObsoleteOutput]
          - id: ApiMarkDotNet-DotNetGenerator-RecognizeNamespaceDocCarrierClass
            title: DotNetGenerator shall recognize internal static NamespaceDoc classes as
              namespace documentation carriers.
            justification: |
              The NamespaceDoc convention is the standard way to attach documentation to a
              namespace in C#. ApiMark must identify these carrier classes so their XML
              summary can be used as the namespace description.
            tests:
              - DotNetGenerator_Generate_NamespaceDocClass_ExcludedFromTypeListing
              - DotNetGenerator_NamespacePage_NamespaceDocSummary_AppearsAsNamespaceDescription
          - id: ApiMarkDotNet-DotNetGenerator-ExcludeNamespaceDocCarrierFromTypeListing
            title: DotNetGenerator shall exclude NamespaceDoc carrier classes from generated
              type listings.
            justification: |
              Including the carrier class in type listings would pollute the API surface with
              an implementation detail not intended for public consumption.
            tests:
              - DotNetGenerator_Generate_NamespaceDocClass_ExcludedFromTypeListing
          - id: ApiMarkDotNet-DotNetGenerator-UseNamespaceDocSummaryAsNamespaceDescription
            title: DotNetGenerator shall use the XML summary of a NamespaceDoc class as the
              description for its containing namespace.
            justification: |
              Developer-authored namespace descriptions belong in the published API reference.
              The NamespaceDoc carrier class is the standard mechanism for providing this
              description.
            tests:
              - DotNetGenerator_NamespacePage_NamespaceDocClass_ExcludedFromTypeListing
              - DotNetGenerator_NamespacePage_NamespaceDocSummary_AppearsAsNamespaceDescription
          - id: ApiMarkDotNet-DotNetGenerator-RejectMissingAssemblyPath
            title: DotNetGenerator shall throw FileNotFoundException when the configured
              assembly path does not exist.
            justification: |
              Fail-fast on a missing assembly avoids a confusing downstream error and gives
              the caller an actionable exception with the missing path.
            tests:
              - DotNetGenerator_Parse_MissingAssemblyPath_ThrowsFileNotFoundException
          - id: ApiMarkDotNet-DotNetGenerator-RejectMissingXmlDocPath
            title: DotNetGenerator shall throw FileNotFoundException when the configured
              XML documentation path does not exist.
            justification: |
              Fail-fast on a missing XML documentation file avoids a confusing downstream
              error and gives the caller an actionable exception with the missing path.
            tests:
              - DotNetGenerator_Generate_XmlDocMissing_ThrowsFileNotFoundException
          - id: ApiMarkDotNet-DotNetGenerator-RejectNullOptions
            title: DotNetGenerator constructor shall throw ArgumentNullException when options
              is null.
            justification: |
              Null options would produce a NullReferenceException at an unpredictable point
              during generation. Rejecting null at construction gives the caller a precise,
              actionable failure.
            tests:
              - DotNetGenerator_Constructor_NullOptions_ThrowsArgumentNullException
          - id: ApiMarkDotNet-DotNetGenerator-RejectNullContext
            title: DotNetGenerator.Parse shall throw ArgumentNullException when context is null.
            justification: |
              A null context would produce a NullReferenceException at the first
              context.WriteLine call. Rejecting null eagerly gives the caller a precise,
              actionable failure.
            tests:
              - DotNetGenerator_Parse_NullContext_ThrowsArgumentNullException
          - id: ApiMarkDotNet-DotNetGenerator-BuildInheritanceChainForInheritDoc
            title: DotNetGenerator shall build and supply an inheritance chain map from
              assembly metadata to XmlDocReader to enable bare inheritdoc resolution.
            justification: |
              Bare inheritdoc elements (without a cref attribute) require an inheritance
              chain map to resolve the correct base documentation. Building this map at
              parse time from Mono.Cecil metadata allows XmlDocReader to resolve inherited
              documentation without accessing the assembly again during emit.
            tests:
              - DotNetGenerator_Generate_SampleImplementationNameMemberPage_UsesInheritedSummary
              - DotNetGenerator_Generate_SampleImplementationExecuteMemberPage_UsesInheritedSummaryAndParamDescription
