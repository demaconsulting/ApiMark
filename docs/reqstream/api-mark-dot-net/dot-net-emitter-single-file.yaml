---
# DotNetEmitterSingleFile unit requirements
sections:
  - title: ApiMarkDotNet Requirements
    sections:
      - title: DotNetEmitterSingleFile Requirements
        requirements:
          - id: ApiMarkDotNet-DotNetEmitterSingleFile-EmitAllApiIntoSingleFile
            title: DotNetEmitterSingleFile shall emit all assembly API documentation into
              a single api.md file.
            justification: |
              Single-file output provides a compact, linear reference for contexts where a
              hierarchical file tree is unwanted, such as embedding documentation in a pull
              request, PDF compilation, or a chatbot context window.
            tests:
              - DotNetEmitterSingleFile_Emit_ValidModel_CreatesExactlyOneWriter
              - DotNetEmitterSingleFile_Emit_ValidModel_CreatesApiFileOnly
              - DotNetEmitterSingleFile_Emit_ValidModel_ApiFileContainsAssemblyHeading
              - DotNetEmitterSingleFile_Emit_ValidModel_ApiFileContainsNamespaceHeading
              - DotNetEmitterSingleFile_Emit_ValidModel_ApiFileContainsTypeHeading
              - DotNetGenerator_Generate_SingleFileOutput_WritesSingleApiMarkdown
              - DotNetGenerator_SingleFile_MethodWithExample_EmitsCodeBlock

          - id: ApiMarkDotNet-DotNetEmitterSingleFile-OffsetHeadingsByHeadingDepth
            title: DotNetEmitterSingleFile shall offset all heading levels in the output
              by the HeadingDepth value specified in EmitConfig.
            justification: |
              HeadingDepth allows the generated content to be embedded into a larger
              document without conflicting with the host document's heading hierarchy.
              A HeadingDepth of 1 produces H1/H2/H3; a value of 2 produces H2/H3/H4.
            tests:
              - DotNetEmitterSingleFile_Emit_NonDefaultHeadingDepth_OffsetsHeadings

          - id: ApiMarkDotNet-DotNetEmitterSingleFile-EmitAssemblyDescription
            title: DotNetEmitterSingleFile shall emit the AssemblyDescriptionAttribute value
              as a paragraph following the assembly-level heading.
            justification: |
              The assembly description provides high-level context for the documented library
              and is immediately discoverable in single-file output without navigation.
            tests:
              - DotNetEmitterSingleFile_Emit_AssemblyWithDescription_EmitsDescriptionParagraph

          - id: ApiMarkDotNet-DotNetEmitterSingleFile-EmitNamespaceDocSummary
            title: DotNetEmitterSingleFile shall emit the NamespaceDoc XML summary as a
              paragraph following the namespace heading.
            justification: |
              Namespace descriptions authored via the NamespaceDoc convention must appear in
              single-file output so readers have namespace context without navigating separate
              pages.
            tests:
              - DotNetEmitterSingleFile_Emit_NamespaceWithDoc_EmitsNamespaceSummary

          - id: ApiMarkDotNet-DotNetEmitterSingleFile-EmitNamespaceDocRemarksAndExamples
            title: DotNetEmitterSingleFile shall emit the NamespaceDoc remarks and example
              parts after the namespace summary.
            justification: |
              A NamespaceDoc carrier can document a namespace with remarks and worked
              examples. Emitting the remarks paragraph and structured example parts after the
              summary — mirroring the type-level rendering — surfaces the full authored
              namespace documentation in single-file output.
            tests:
              - DotNetEmitterSingleFile_Emit_NamespaceWithDoc_EmitsNamespaceRemarks
              - DotNetEmitterSingleFile_Emit_NamespaceWithDoc_EmitsNamespaceExampleCodeBlock
              - DotNetEmitterSingleFile_Emit_TypeWithListRemarks_RendersTableInMarkdown

          - id: ApiMarkDotNet-DotNetEmitterSingleFile-EmitCompactMemberBulletList
            title: DotNetEmitterSingleFile shall emit a compact bullet list of member names
              and summaries before the per-member heading sections within each type section.
            justification: |
              The bullet list provides a quick overview of all members before diving into the
              detail sections, reducing reading time for large types.
            tests:
              - DotNetEmitterSingleFile_Emit_TypeWithMembers_EmitsBulletListBeforeMemberHeadings

          - id: ApiMarkDotNet-DotNetEmitterSingleFile-EmitMembersConstructorsFirst
            title: DotNetEmitterSingleFile shall emit constructor members before all other
              members, with remaining members ordered alphabetically.
            justification: |
              Constructors are the primary entry point for using a type; placing them first
              matches the reader's natural expectation when learning an API.
            tests:
              - DotNetEmitterSingleFile_Emit_TypeWithConstructorAndMethods_ConstructorAppearsFirst

          - id: ApiMarkDotNet-DotNetEmitterSingleFile-SkipMemberListForDelegates
            title: DotNetEmitterSingleFile shall omit the member listing section for delegate
              types.
            justification: |
              Delegate types expose compiler-generated members (Invoke, BeginInvoke, EndInvoke)
              that are not meaningful API content; omitting them keeps the delegate section
              focused on signature and description.
            tests:
              - DotNetEmitterSingleFile_Emit_DelegateType_NoMemberSectionsEmitted

          - id: ApiMarkDotNet-DotNetEmitterSingleFile-EmitNestedTypeParentNotice
            title: DotNetEmitterSingleFile shall emit a parent-context notice paragraph for
              nested types indicating their containing type.
            justification: |
              In single-file output there is no folder hierarchy to convey nesting
              relationships; an explicit notice paragraph makes the containing type
              relationship discoverable.
            tests:
              - DotNetEmitterSingleFile_Emit_NestedType_EmitsParentNotice

          - id: ApiMarkDotNet-DotNetEmitterSingleFile-EmitPlainTextParameterTypes
            title: DotNetEmitterSingleFile shall render parameter type cells as plain text
              rather than Markdown links.
            justification: |
              Relative file links are meaningless inside a single document; plain-text type
              names keep the output valid in any Markdown renderer without broken link
              references.
            tests:
              - DotNetEmitterSingleFile_Emit_MethodWithParameter_TypeCellIsPlainText
