---
# XmlDocReader unit requirements
sections:
  - title: ApiMarkDotNet Requirements
    sections:
      - title: XmlDocReader Requirements
        requirements:
          - id: ApiMarkDotNet-XmlDocReader-ParseAndIndexXmlDocumentation
            title: XmlDocReader shall read assembly documentation data from a .NET XML
              documentation file.
            justification: |
              Assembly documentation comes from compiler-produced XML files. XmlDocReader
              parses and indexes all documentation metadata — including summary, remarks,
              parameters, returns, exceptions, and examples — on construction, ensuring
              each per-member lookup during emit uses direct index access rather than a
              linear scan and keeping generation time proportional to the number of
              documented members.
            tests:
              - XmlDocReader_Constructor_FileDoesNotExist_ThrowsFileNotFoundException
              - XmlDocReader_GetSummary_MemberPresent_ReturnsTrimmedText
              - XmlDocReader_GetSummary_WithInlineReferences_PreservesReferencedNames
              - XmlDocReader_GetSummary_MemberAbsent_ReturnsNull
              - XmlDocReader_GetRemarks_MemberPresent_ReturnsTrimmedText
              - XmlDocReader_GetExceptions_MemberWithExceptions_ReturnsCrefValues
              - XmlDocReader_GetParams_MemberWithParams_ReturnsNamesAndDescriptions
              - XmlDocReader_GetReturns_MemberWithReturns_ReturnsTrimmedText
              - XmlDocReader_GetExample_MemberWithExample_ReturnsTrimmedText
              - XmlDocReader_GetExample_WhitespaceOnly_ReturnsNull
              - XmlDocReader_GetExampleParts_NoCodeElement_ReturnsWholeTextAsCodePart
              - XmlDocReader_GetExampleParts_WithCodeElement_SeparatesProseFromCode
              - XmlDocReader_GetExampleParts_MemberAbsent_ReturnsEmpty
              - XmlDocReader_GetExceptionDetails_MemberWithExceptions_ReturnsFormattedTypesAndDescriptions
              - XmlDocReader_GetRemarks_MemberAbsent_ReturnsNull
              - XmlDocReader_GetReturns_MemberAbsent_ReturnsNull
              - XmlDocReader_GetExample_MemberAbsent_ReturnsNull
          - id: ApiMarkDotNet-XmlDocReader-RenderXmlDocLists
            title: XmlDocReader shall render `<list>` elements (bullet, number, table)
              with `<item>`/`<term>`/`<description>` as Markdown lists or tables.
            justification: |
              XML documentation authors use `<list>` elements to express bullet lists,
              numbered lists, and tables. Rendering these as their Markdown equivalents —
              dash items, ordered items, and pipe tables — preserves the authored
              structure instead of flattening it to concatenated inline text. A
              `<term>`/`<description>` pair renders as a bold term followed by an em dash
              and its description, and nested inline elements such as `<c>` continue to
              render through the shared inline-element dispatch.
            tests:
              - XmlDocReader_GetRemarks_BulletList_RendersDashItems
              - XmlDocReader_GetRemarks_NumberList_RendersOrderedItems
              - XmlDocReader_GetRemarks_TableList_RendersMarkdownTable
              - XmlDocReader_GetRemarks_ListItemWithTermAndDescription_RendersBoldTermDashDescription
              - XmlDocReader_GetRemarks_ListItemWithInlineCode_PreservesInlineRendering
              - XmlDocReader_GetRemarks_ListSurroundedByProse_KeepsBlankLineSeparation
              - XmlDocReader_GetRemarks_TableListCellWithPipe_EscapesPipe
              - XmlDocReader_GetRemarks_NestedListInsideItem_RendersInlineWithoutBrokenMarkdown
          - id: ApiMarkDotNet-XmlDocReader-InheritDoc
            title: XmlDocReader shall resolve `<inheritdoc />` references and inherit
              XML documentation from base members and interface members.
            justification: >
              C# XML documentation supports `<inheritdoc />` to inherit documentation
              from base class members or interface members. ApiMark must resolve these
              references to provide complete documentation for derived types.
            tests:
              - XmlDocReader_GetSummary_InheritDocWithCref_ReturnsSummaryFromTarget
              - XmlDocReader_GetRemarks_InheritDocWithCref_ReturnsRemarksFromTarget
              - XmlDocReader_GetParams_InheritDocWithCref_ReturnsParamsFromTarget
              - XmlDocReader_GetReturns_InheritDocWithCref_ReturnsReturnsFromTarget
              - XmlDocReader_GetSummary_InheritDocWithCref_MissingTarget_ReturnsNull
              - XmlDocReader_GetSummary_InheritDocWithCref_CyclicReference_ReturnsNull
              - XmlDocReader_GetSummary_InheritDocWithPath_ReturnsFilteredSummary
              - XmlDocReader_GetSummary_InheritDocWithPath_NonMatchingPath_ReturnsNull
              - XmlDocReader_GetSummary_InheritDocWithCrefAndPath_ReturnsFilteredSummaryFromTarget
              - XmlDocReader_GetSummary_InheritDocBare_WithChain_ReturnsSummaryFromBase
              - XmlDocReader_GetSummary_InheritDocBare_NoChain_ReturnsNull
              - XmlDocReader_GetSummary_InheritDocBare_ChainMemberAbsent_ReturnsNull
              - XmlDocReader_GetSummary_InheritDocChained_ResolvesTransitively
              - XmlDocReader_GetExceptions_InheritDocWithCref_ReturnsExceptionsFromTarget
              - XmlDocReader_GetExceptionDetails_InheritDocWithCref_ReturnsExceptionDetailsFromTarget
              - XmlDocReader_GetExample_InheritDocWithCref_ReturnsExampleFromTarget
              - XmlDocReader_GetExampleParts_InheritDocWithCref_ReturnsExamplePartsFromTarget
              - XmlDocReader_GetSummary_InheritDocBare_MultipleChainCandidates_SecondCandidateNotBlockedByFirstsVisited
