---
# ApiMarkCore system-level requirements
sections:
  - title: ApiMarkCore Requirements
    requirements:
      - id: ApiMarkCore-IApiGenerator-ProvideLanguageGeneratorContract
        title: ApiMarkCore shall provide a two-stage language-generator contract (Parse + Emit) that callers can use to invoke any supported language module with a configurable output format.
        justification: |
          ApiMark needs a common contract so the CLI and any build integration can
          trigger documentation generation without knowing the implementation details
          of each language-specific module. Separating Parse from Emit allows the
          caller to select the output format at emit time, enabling gradual-disclosure
          and single-file output from the same parsed symbol model.
        children:
          - ApiMarkCore-IApiGenerator-DefineParseMethod
          - ApiMarkCore-IApiGenerator-AllowConstructionTimeConfiguration
          - ApiMarkCore-IApiGenerator-EmitterProducesEntrypointFile
          - ApiMarkCore-IApiGenerator-SupportConfigurableOutputFormat
        tests:
          - ApiMarkCore_GeneratorContract_SupportedLanguage_CanBeInvoked
      - id: ApiMarkCore-IContext-ProvideOutputChannel
        title: ApiMarkCore shall provide a minimal output channel interface that language generators can use to emit informational and error messages without depending on Console.
        justification: |
          ApiMark generators need to emit diagnostic output without depending on
          Console directly, so the channel can be captured, suppressed, or
          redirected by the caller. This enables testability and flexible output
          routing across CLI, MSBuild, and test hosts.
        children:
          - ApiMarkCore-IContext-DefineWriteLineMethod
          - ApiMarkCore-IContext-DefineWriteErrorMethod
        tests:
          - ApiMarkCore_ContextContract_WrittenMessages_AreAccessibleForAssertion
      - id: ApiMarkCore-IMarkdownWriterFactory-ProvideMarkdownWriterFactoryInterface
        title: ApiMarkCore shall provide a factory interface for creating per-file Markdown writers so that language generators are decoupled from the file-system.
        justification: |
          Decoupling generators from the file-system via a factory contract allows
          the same generator code to write to disk in production and to memory in
          tests, making generator output fully verifiable without I/O.
        children:
          - ApiMarkCore-IMarkdownWriterFactory-DefineCreateMarkdownMethod
          - ApiMarkCore-IMarkdownWriterFactory-SupportRootLevelFiles
          - ApiMarkCore-IMarkdownWriterFactory-RejectInvalidOutputDirectory
          - ApiMarkCore-IMarkdownWriterFactory-EnsureOutputDirectory
        tests:
          - ApiMarkCore_WriterFactory_CanCreate_RootAndSubfolderWriters
      - id: ApiMarkCore-IMarkdownWriter-ProvideMarkdownOutputInterface
        title: ApiMarkCore shall provide a markdown output interface for writing individual documentation files.
        justification: |
          A shared markdown-writing abstraction keeps the generated document shape
          consistent while allowing output helpers to evolve without changing each
          language generator.
        children:
          - ApiMarkCore-IMarkdownWriter-ImplementIDisposable
          - ApiMarkCore-IMarkdownWriter-DefineWriteHeading
          - ApiMarkCore-IMarkdownWriter-DefineWriteSignature
          - ApiMarkCore-IMarkdownWriter-DefineWriteParagraph
          - ApiMarkCore-IMarkdownWriter-DefineWriteTable
          - ApiMarkCore-IMarkdownWriter-DefineWriteCodeBlock
          - ApiMarkCore-IMarkdownWriter-DefineWriteLink
        tests:
          - ApiMarkCore_MarkdownWriterContract_FileSections_RenderConsistently
      - id: ApiMarkCore-PathHelpers-ProvideSafePathCombinationHelper
        title: ApiMarkCore shall provide an internal helper for safely combining caller-supplied relative path segments with a trusted base path.
        justification: |
          ApiMark needs one auditable place to enforce path-safety rules so file-based
          helpers do not each implement their own traversal checks inconsistently.
        children:
          - ApiMarkCore-PathHelpers-CombineValidRelativeSegments
          - ApiMarkCore-PathHelpers-RejectTraversalSegments
          - ApiMarkCore-PathHelpers-RejectNullArguments
        tests:
          - PathHelpers_SafePathCombine_ValidPaths_CombinesCorrectly
          - PathHelpers_SafePathCombine_PathTraversalWithDoubleDots_ThrowsArgumentException
          - PathHelpers_SafePathCombine_AbsoluteSegment_WithinBase_CombinesCorrectly
          - PathHelpers_SafePathCombine_NullBasePath_ThrowsArgumentNullException
