---
# Microsoft.Extensions.FileSystemGlobbing OTS requirements
sections:
  - title: OTS Software Requirements
    sections:
      - title: FileSystemGlobbing Requirements
        requirements:
          - id: FileSystemGlobbing-Matcher-MatchIncludePatterns
            title: Microsoft.Extensions.FileSystemGlobbing shall match files against
              gitignore-style glob include patterns rooted at a given directory.
            justification: |
              GlobFileCollector depends on Matcher to enumerate files matching
              caller-supplied glob patterns. Any defect in pattern evaluation would
              cause incorrect file sets to be passed to the language generators.
            tests:
              - GlobFileCollector_Collect_RelativeVhdPattern_FindsVhdFiles
              - GlobFileCollector_Collect_AbsolutePattern_FindsFiles
          - id: FileSystemGlobbing-Matcher-ExcludePatterns
            title: Microsoft.Extensions.FileSystemGlobbing shall support exclusion
              patterns that remove previously matched files from the result set.
            justification: |
              GlobFileCollector uses exclusion patterns (! prefix) to let callers
              narrow the file set after broad inclusions. The Matcher must honor these
              correctly so that excluded files never appear in documentation output.
            tests: [GlobFileCollector_Collect_ExclusionPattern_RemovesMatchedFiles]
          - id: FileSystemGlobbing-Matcher-NonExistentRoot
            title: Microsoft.Extensions.FileSystemGlobbing shall return an empty result
              without throwing when the pattern root directory does not exist.
            justification: |
              GlobFileCollector silently skips missing roots. This behavior relies on
              Matcher not throwing for absent directories, avoiding spurious build
              failures when optional source roots are absent in CI.
            tests:
              - GlobFileCollector_Collect_NonExistentRoot_ReturnsEmptyWithoutThrowing
