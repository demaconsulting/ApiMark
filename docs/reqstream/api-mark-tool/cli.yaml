---
# ApiMarkTool Cli subsystem requirements
sections:
  - title: ApiMarkTool Requirements
    sections:
      - title: Cli Requirements
        requirements:
          - id: ApiMarkTool-Cli-ProvideCliArgumentParsing
            title: The Cli subsystem shall parse all command-line arguments into typed, queryable options and route program output to the appropriate channels.
            justification: |
              A dedicated subsystem for argument parsing keeps Program.cs free of parsing
              logic and enables isolated testing of the argument-parsing contract.
            children:
              - ApiMarkTool-Cli-Context-ParseGlobalFlags
              - ApiMarkTool-Cli-Context-ParseLanguageSubcommand
              - ApiMarkTool-Cli-Context-ParseLanguageOptions
              - ApiMarkTool-Cli-Context-ParseIncludes
              - ApiMarkTool-Cli-Context-ParseApiHeaders
              - ApiMarkTool-Cli-Context-ParseCppNamedOptions
              - ApiMarkTool-Cli-Context-ParseDepthOption
              - ApiMarkTool-Cli-Context-ParseResultsOption
              - ApiMarkTool-Cli-Context-OpenLogFileOnRequest
              - ApiMarkTool-Cli-Context-TrackErrorsViaWriteError
              - ApiMarkTool-Cli-Context-ParseFormatOption
              - ApiMarkTool-Cli-Context-ParseClangPath
            tests:
              - Context_Cli_ParsesAllGlobalFlags
