---
# Context unit requirements
sections:
  - title: ApiMarkTool Requirements
    sections:
      - title: Cli Requirements
        sections:
          - title: Context Requirements
            requirements:
              - id: ApiMarkTool-Cli-Context-ParseGlobalFlags
                title: Context shall parse the global flags -v/--version, -?/-h/--help,
                  --silent, and --validate.
                justification: |
                  Global flags must be available regardless of the language subcommand so that
                  users can check the version, get help, or request silent operation without
                  needing to specify a language first.
                tests:
                  - Context_Create_WithVersionFlag_SetsVersionTrue
                  - Context_Create_WithShortVersionFlag_SetsVersionTrue
                  - Context_Create_WithHelpFlag_SetsHelpTrue
                  - Context_Create_WithHelpShortFlags_SetHelpTrue
                  - Context_Create_WithSilentFlag_SetsSilentTrue
                  - Context_Create_WithValidateFlag_SetsValidateTrue
              - id: ApiMarkTool-Cli-Context-ParseLanguageSubcommand
                title: Context shall set the Language property to the first positional
                  non-flag token in the argument list.
                justification: |
                  A positional subcommand allows users to specify the documentation language
                  without a flag prefix, matching common CLI conventions and keeping the
                  invocation concise.
                tests: [Context_Create_WithLanguageSubcommand_SetsLanguage]
              - id: ApiMarkTool-Cli-Context-ParseLanguageOptions
                title: Context shall parse the language-specific options --assembly,
                  --xml-doc, --output, --visibility, and --include-obsolete.
                justification: |
                  Language-specific options must be available to callers as typed properties so
                  that generators can be configured without re-parsing the command line.
                tests:
                  - Context_Create_WithAssemblyOption_SetsAssemblyPath
                  - Context_Create_WithXmlDocOption_SetsXmlDocPath
                  - Context_Create_WithOutputOption_SetsOutputPath
                  - Context_Create_WithVisibilityOption_SetsVisibility
                  - Context_Create_WithIncludeObsoleteFlag_SetsIncludeObsoleteTrue
              - id: ApiMarkTool-Cli-Context-ParseIncludes
                title: Context shall parse repeated --includes flags and accumulate
                  each plain directory path into the Includes array in order.
                justification: |
                  C++ projects pass one include root per --includes flag; the context must
                  accumulate all supplied paths in order so CppGenerator receives the complete
                  set of include roots without any path being dropped or reordered.
                tests:
                  - Context_Create_WithIncludesOption_SetsIncludes
                  - Context_Create_WithRepeatedIncludes_AccumulatesAllPaths
                  - Context_Create_WithSingleInclude_SetsSinglePath
              - id: ApiMarkTool-Cli-Context-ParseApiHeaders
                title: Context shall parse repeated --api-headers flags and accumulate
                  each pattern into the ApiHeaders array in order, forwarding '!'-prefixed
                  exclusion patterns verbatim.
                justification: |
                  C++ projects express gitignore-style header selection as an ordered sequence of
                  include patterns and '!'-prefixed exclusion patterns. The context must accumulate all
                  supplied patterns in order and forward exclusion patterns verbatim so CppGenerator can
                  apply last-match-wins semantics correctly.
                tests:
                  - Context_Create_WithRepeatedApiHeaders_AccumulatesAllPatternsInOrder
                  - Context_Create_WithApiHeadersExclusionPattern_ForwardsVerbatim
                  - Context_Create_WithNoArguments_HasEmptyApiHeaders
              - id: ApiMarkTool-Cli-Context-ParseCppNamedOptions
                title: Context shall parse the named options --library-name, --library-description,
                  --defines, and --cpp-standard into the corresponding Context properties,
                  where --library-name and --library-description are shared by the
                  C++ and VHDL subcommands.
                justification: |
                  C++ and VHDL documentation generation share library metadata options
                  (--library-name and --library-description) while --defines and --cpp-standard
                  are C++ specific. Grouping these as a unit gives a single traceable requirement
                  for the cpp-specific and shared scalar option set.
                children:
                  - ApiMarkTool-Cli-Context-ParseLibraryName
                  - ApiMarkTool-Cli-Context-ParseLibraryDescription
                  - ApiMarkTool-Cli-Context-ParseDefines
                  - ApiMarkTool-Cli-Context-ParseCppStandard
                tests:
                  - Context_Create_WithLibraryNameOption_SetsLibraryName
                  - Context_Create_WithLibraryDescriptionOption_SetsLibraryDescription
                  - Context_Create_WithDefinesOption_SetsDefines
                  - Context_Create_WithCppStandardOption_SetsCppStandard
              - id: ApiMarkTool-Cli-Context-ParseLibraryName
                title: Context shall parse the --library-name option and store it
                  in the LibraryName property.
                justification: |
                  Program.CreateGenerator passes LibraryName to both CppGeneratorOptions and
                  VhdlGeneratorOptions so that the generated api.md uses the project-supplied
                  display name rather than a filename for both C++ and VHDL subcommands.
                tests: [Context_Create_WithLibraryNameOption_SetsLibraryName]
              - id: ApiMarkTool-Cli-Context-ParseLibraryDescription
                title: Context shall parse the --library-description option and store
                  it in the LibraryDescription property.
                justification: |
                  Program.CreateGenerator passes LibraryDescription to both CppGeneratorOptions
                  and VhdlGeneratorOptions so the generated api.md can include a project-supplied
                  description paragraph for both C++ and VHDL subcommands.
                tests:
                  - Context_Create_WithLibraryDescriptionOption_SetsLibraryDescription
              - id: ApiMarkTool-Cli-Context-ParseDefines
                title: Context shall parse the --defines option and store the comma-separated
                  values in the Defines array.
                justification: |
                  C++ projects rely on preprocessor defines (e.g. export macros) for correct
                  parsing. Context must split the comma-separated list and store each define so
                  Program.CreateGenerator can pass them to CppGeneratorOptions.
                tests: [Context_Create_WithDefinesOption_SetsDefines]
              - id: ApiMarkTool-Cli-Context-ParseCppStandard
                title: Context shall parse the --cpp-standard option and store it
                  in the CppStandard property.
                justification: |
                  Different C++ projects target different language standards; CppGenerator must
                  receive the same standard as the actual build to parse headers correctly.
                tests: [Context_Create_WithCppStandardOption_SetsCppStandard]
              - id: ApiMarkTool-Cli-Context-ParseDepthOption
                title: Context shall parse the --depth option and set HeadingDepth
                  to the specified integer value in the range 1–6, defaulting to 1
                  when the option is absent.
                justification: |
                  The --depth option controls the Markdown heading level used in generated output,
                  allowing ApiMark output to be embedded into an existing document at the correct
                  heading depth without manual post-processing. Restricting the range to 1–6
                  matches the valid ATX heading levels in Markdown.
                tests:
                  - Context_Create_WithDepthOption_SetsHeadingDepth
                  - Context_Create_WithDepth3AndSingleFileFormat_Succeeds
                  - Context_Create_WithDepthOptionOutOfRange_ThrowsArgumentException
              - id: ApiMarkTool-Cli-Context-ParseResultsOption
                title: Context shall parse the --results (alias --result) option and
                  set ResultsFile to the specified path.
                justification: |
                  ApiMarkTask passes a results file path so that self-test output can be written
                  to a discoverable location for the build pipeline to collect test evidence.
                tests: [Context_Create_WithResultsOption_SetsResultsFile]
              - id: ApiMarkTool-Cli-Context-OpenLogFileOnRequest
                title: Context shall open the file specified by --log and mirror all
                  subsequent output written through `WriteLine` and `WriteError` to
                  that file.
                justification: |
                  ApiMarkTask invokes ApiMarkTool out-of-process; the log file captures both
                  normal output and error messages, making it a reliable capture path for both
                  stdout and stderr even when console redirection is unavailable.
                tests:
                  - Context_Create_WithLogFile_OpensAndWritesToLog
                  - Context_OpenLogFile_ErrorOutputAlsoWrittenToLog
              - id: ApiMarkTool-Cli-Context-TrackErrorsViaWriteError
                title: Context shall set ExitCode to 1 when WriteError is called at
                  least once.
                justification: |
                  Callers must be able to detect that errors occurred without inspecting
                  individual error messages; a non-zero exit code is the conventional
                  failure signal for command-line tools.
                tests: [Context_WriteError_SetsExitCodeToOne]
              - id: ApiMarkTool-Cli-Context-ParseFormatOption
                title: Context shall parse the --format option and store it in the
                  Format property.
                justification: |
                  The output format controls whether ApiMark writes the gradual-disclosure tree or
                  the single-file api.md variant, so the CLI must forward the user's choice into
                  Context for generator configuration.
                tests:
                  - Context_Create_WithFormatGradual_SetsGradualDisclosureFormat
                  - Context_Create_WithFormatSingleFile_SetsSingleFileFormat
                  - Context_Create_WithNoFormatOption_DefaultsToGradualDisclosure
                  - Context_Create_WithInvalidFormat_ThrowsArgumentException
              - id: ApiMarkTool-Cli-Context-ParseClangPath
                title: Context shall parse the --clang-path <path> option and expose
                  the value for use by the cpp subcommand.
                justification: |
                  The cpp subcommand passes ClangPath to the CppGenerator to override the default
                  clang binary location discovered via PATH, xcrun (macOS), or vswhere (Windows).
                tests: [Context_Create_WithClangPathOption_SetsClangPath]
              - id: ApiMarkTool-Cli-Context-ParseVhdlSourceOptions
                title: Context shall parse repeated --source flags and accumulate
                  them into the Sources array in order, preserving any leading ! exclusion
                  prefix.
                justification: |
                  VHDL projects select source files using gitignore-style glob patterns supplied
                  via repeated --source flags. Patterns prefixed with ! are exclusion patterns.
                  All patterns must be accumulated in order so VhdlGenerator can apply last-
                  match-wins semantics correctly.
                tests:
                  - Context_Create_WithSourceOption_SetsSources
                  - Context_Create_WithRepeatedSource_AccumulatesAllPaths
                  - Context_Create_WithSourceExclusionPattern_ForwardsVerbatim
              - id: ApiMarkTool-Cli-Context-RejectFlagAsOptionValue
                title: Context shall throw ArgumentException when a flag token (starting
                  with '-') is supplied as the value of a string-valued option.
                justification: |
                  Accepting a flag token as a value silently consumes it as data instead of
                  raising a parse error, causing confusing behavior where the intended flag is
                  never applied and the option receives a nonsensical value.
                tests:
                  - Context_Create_WithFlagValueForOutput_ThrowsArgumentException
                  - Context_Create_WithFlagValueForLog_ThrowsArgumentException
