---
# VhdlGenerator unit requirements
sections:
  - title: ApiMarkVhdl Requirements
    sections:
      - title: VhdlGenerator Requirements
        requirements:
          - id: ApiMarkVhdl-VhdlGenerator-AcceptSourceGlobPatterns
            title: VhdlGenerator shall accept one or more glob patterns that select
              which .vhd and .vhdl source files to document, using gitignore-style
              last-match-wins semantics with ! prefix exclusion patterns.
            justification: |
              VHDL projects organize IP cores as individual files or as directories of .vhd
              files. Glob patterns with gitignore-style last-match-wins semantics and ! prefix
              exclusion allow callers to specify and refine the source file set without
              requiring project reorganization.
            children: [ApiMarkVhdl-VhdlGenerator-ReportNoFilesMatched]
            tests:
              - VhdlGenerator_Constructor_NullOptions_ThrowsArgumentNullException
              - VhdlGenerator_Generate_FixtureFile_CreatesApiEntrypoint
              - VhdlGenerator_Generate_FixtureFile_CreatesEntityPage
              - VhdlGenerator_Generate_AllFixtures_ProducesExpectedOutputStructure
          - id: ApiMarkVhdl-VhdlGenerator-ValidatesLibraryName
            title: VhdlGenerator shall throw ArgumentException when the LibraryName
              option is null, empty, or whitespace-only.
            justification: |
              An empty or whitespace library name would produce a meaningless documentation
              heading. Failing fast at construction provides a clear error before any parsing
              or emission occurs.
            tests:
              - VhdlGenerator_Constructor_EmptyLibraryName_ThrowsArgumentException
              - VhdlGenerator_Constructor_WhitespaceLibraryName_ThrowsArgumentException
          - id: ApiMarkVhdl-VhdlGenerator-ReportNoFilesMatched
            title: VhdlGenerator shall report an error via the context when no source
              files match the configured glob patterns.
            justification: |
              Reporting a clear error when no files are matched prevents silently
              producing an empty documentation set that would indicate successful
              generation to the caller.
            tests:
              - VhdlGenerator_Parse_NoFilesMatched_EmitsErrorAndReturnsEmptyEmitter
          - id: ApiMarkVhdl-VhdlGenerator-ReportParseErrors
            title: VhdlGenerator shall report an error via the context when a source
              file fails to parse, and continue processing remaining files.
            justification: |
              Continuing after a parse failure allows other files in the set to be
              documented even when one file is malformed, and the error report
              identifies which file caused the problem.
            tests: [VhdlGenerator_Parse_InvalidVhdlFile_EmitsErrorAndSkipsFile]
