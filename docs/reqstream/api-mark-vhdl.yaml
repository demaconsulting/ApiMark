---
# ApiMarkVhdl system-level requirements
sections:
  - title: ApiMarkVhdl Requirements
    requirements:
      - id: ApiMarkVhdl-VhdlGenerator-GenerateDocumentationFromVhdlSources
        title: ApiMarkVhdl shall generate API documentation from VHDL source files and their --! doc comments.
        justification: |
          ApiMark needs to document VHDL IP cores from .vhd source files so that AI agents
          and developers can browse entity interfaces, generics, ports, and architectures
          without opening the source files. The --! doc comment convention is the standard
          VHDL Doxygen-compatible annotation format supported by HDL documentation toolchains.
        children:
          - ApiMarkVhdl-VhdlGenerator-AcceptSourceFilesAndDirectories
          - ApiMarkVhdl-VhdlGenerator-ParseVhdlSourcesViaAntlr
          - ApiMarkVhdl-VhdlGenerator-ExtractEntitiesArchitecturesPackages
          - ApiMarkVhdl-VhdlGenerator-ExtractDocComments
          - ApiMarkVhdl-VhdlGenerator-EmitGradualDisclosureOutput
          - ApiMarkVhdl-VhdlGenerator-EmitSingleFileOutput
          - ApiMarkVhdl-VhdlAstModel
          - ApiMarkVhdl-VhdlAstParser
          - ApiMarkVhdl-VhdlEmitter
          - ApiMarkVhdl-VhdlEmitterGradualDisclosure
          - ApiMarkVhdl-VhdlEmitterSingleFile
        tests:
          - VhdlGenerator_Generate_FixtureFile_CreatesApiEntrypoint
      - id: ApiMarkVhdl-VhdlGenerator-AcceptSourceFilesAndDirectories
        title: VhdlGenerator shall accept source files and source directories as input.
        justification: |
          VHDL projects may organize IP cores as individual files or as directories of .vhd
          files. Supporting both patterns avoids requiring project reorganization.
        tests:
          - VhdlGenerator_Constructor_NullOptions_ThrowsArgumentNullException
          - VhdlGenerator_Generate_FixtureFile_CreatesApiEntrypoint
      - id: ApiMarkVhdl-VhdlGenerator-ParseVhdlSourcesViaAntlr
        title: VhdlGenerator shall parse VHDL source files using the ANTLR4 vhdl2008 grammar.
        justification: |
          A standards-compliant VHDL-2008 parser produces a correct AST for entity, architecture,
          and package declarations without requiring a full HDL simulation toolchain.
        tests:
          - VhdlAstParser_Parse_FixtureFile_ReturnsEntity
      - id: ApiMarkVhdl-VhdlGenerator-ExtractEntitiesArchitecturesPackages
        title: VhdlGenerator shall extract entity, architecture, and package declarations from parsed VHDL files.
        justification: |
          Entities, architectures, and packages are the primary documentation targets in a
          VHDL library. Extracting all three provides a complete API surface for documentation.
        tests:
          - VhdlAstParser_Parse_FixtureFile_EntityHasPorts
          - VhdlAstParser_Parse_FixtureFile_EntityHasGenerics
      - id: ApiMarkVhdl-VhdlGenerator-ExtractDocComments
        title: VhdlGenerator shall extract --! doc comments from VHDL source lines and associate them with declarations.
        justification: |
          The ANTLR grammar discards comments via skip rules. Pre-processing source lines to
          extract --! comments and matching them to declaration line numbers provides
          developer-authored documentation without modifying the grammar.
        tests:
          - VhdlAstParser_Parse_FixtureFile_EntityDocCommentParsed
          - VhdlAstParser_Parse_FixtureFile_PortsHaveInlineDocComments
      - id: ApiMarkVhdl-VhdlGenerator-EmitGradualDisclosureOutput
        title: VhdlGenerator shall emit gradual-disclosure Markdown output with an api index page and per-entity pages.
        justification: |
          The gradual-disclosure format allows AI agents to read the lightweight index first,
          then drill into entity pages only when details are needed.
        tests:
          - VhdlEmitterGradualDisclosure_Emit_MinimalData_CreatesApiIndexPage
          - VhdlEmitterGradualDisclosure_Emit_MinimalData_CreatesEntityPage
          - VhdlEmitterGradualDisclosure_Emit_MinimalData_ApiIndexContainsLibraryNameHeading
          - VhdlGenerator_Generate_FixtureFile_CreatesEntityPage
      - id: ApiMarkVhdl-VhdlGenerator-EmitSingleFileOutput
        title: VhdlGenerator shall emit a single api.md file when OutputFormat.SingleFile is selected.
        justification: |
          Single-file output is required for consumers who want a compact linear reference
          instead of the gradual-disclosure folder tree.
        tests:
          - VhdlEmitterSingleFile_Emit_MinimalData_CreatesExactlyOneWriter
          - VhdlEmitterSingleFile_Emit_MinimalData_CreatesApiFileOnly
      - id: ApiMarkVhdl-VhdlAstModel
        title: VhdlAstModel shall define immutable record types representing VHDL AST declarations.
        justification: |
          Immutable records provide a stable data contract between VhdlAstParser and the
          emitters without shared mutable state.
        tests: []
      - id: ApiMarkVhdl-VhdlAstParser
        title: VhdlAstParser shall parse a .vhd file into a VhdlFileModel using the ANTLR4 vhdl2008 grammar.
        justification: |
          A dedicated parser unit isolates ANTLR4 runtime concerns from the emitter so
          that emitters can be tested with in-memory data without invoking the grammar.
        tests:
          - VhdlAstParser_Parse_FixtureFile_ReturnsEntity
          - VhdlAstParser_Parse_FixtureFile_EntityHasGenerics
          - VhdlAstParser_Parse_FixtureFile_EntityHasPorts
          - VhdlAstParser_Parse_FixtureFile_EntityDocCommentParsed
          - VhdlAstParser_Parse_FixtureFile_PortsHaveInlineDocComments
      - id: ApiMarkVhdl-VhdlEmitter
        title: VhdlEmitter shall implement IApiEmitter and dispatch to format-specific emitters.
        justification: |
          The dispatcher separates format selection from emission logic and validates
          the mandatory factory argument early.
        tests:
          - VhdlEmitter_Emit_NullFactory_ThrowsArgumentNullException
      - id: ApiMarkVhdl-VhdlEmitterGradualDisclosure
        title: VhdlEmitterGradualDisclosure shall write one file per entity/architecture/package plus an api index.
        justification: |
          Separate files per declaration enable gradual disclosure navigation from the index
          to individual entity pages without reading unrelated content.
        tests:
          - VhdlEmitterGradualDisclosure_Emit_MinimalData_CreatesApiIndexPage
          - VhdlEmitterGradualDisclosure_Emit_MinimalData_CreatesEntityPage
          - VhdlEmitterGradualDisclosure_Emit_MinimalData_ApiIndexContainsLibraryNameHeading
      - id: ApiMarkVhdl-VhdlEmitterSingleFile
        title: VhdlEmitterSingleFile shall write all VHDL documentation into a single api.md file.
        justification: |
          Single-file output is the compact alternative to gradual disclosure for consumers
          who prefer a linear document.
        tests:
          - VhdlEmitterSingleFile_Emit_MinimalData_CreatesExactlyOneWriter
          - VhdlEmitterSingleFile_Emit_MinimalData_CreatesApiFileOnly
