---
# ApiMarkMsbuild system-level requirements
sections:
  - title: ApiMarkMsbuild Requirements
    requirements:
      - id: ApiMarkMsbuild-ApiMarkTask-IntegrateWithMsbuild
        title: ApiMarkMsbuild shall integrate ApiMark documentation generation as an MSBuild task for both .csproj and .vcxproj builds.
        justification: |
          Teams using C# and C++ need documentation generation to run automatically
          during normal builds so the published API reference stays aligned with the
          compiled output, regardless of project type.
        children:
          - ApiMarkMsbuild-ApiMarkTask-InferLanguageFromProjectType
          - ApiMarkMsbuild-ApiMarkTask-SpawnToolForDotNet
          - ApiMarkMsbuild-ApiMarkTask-SpawnToolForCpp
          - ApiMarkMsbuild-ApiMarkTask-ForwardOutputDirectoryProperty
          - ApiMarkMsbuild-ApiMarkTask-ForwardVisibilityProperty
          - ApiMarkMsbuild-ApiMarkTask-ForwardIncludeObsoleteFlag
          - ApiMarkMsbuild-ApiMarkTask-SupportDisableProperty
        tests:
          - ApiMarkMsbuild_NuGetPackage_DotNetProject_AutoDocumentsOnBuild
      - id: ApiMarkMsbuild-IncludeDocsInNuGetPackage
        title: ApiMarkMsbuild shall support an opt-in ApiMarkPackDocs property that, when set to true, includes generated documentation in the NuGet package.
        justification: |
          Projects that distribute API documentation alongside their library need a single
          opt-in flag to bundle the generated markdown in the NuGet package so consumers
          can access it without running the generator separately; documentation is excluded
          by default to prevent accidental package size growth.
        tests:
          - ApiMarkMsbuild_NuGetPackage_DotNetProject_PacksDocs_WhenApiMarkPackDocsTrue
          - ApiMarkMsbuild_NuGetPackage_DotNetProject_DoesNotPackDocs_ByDefault
