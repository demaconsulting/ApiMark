---
# ApiMarkCpp system-level requirements
sections:
  - title: ApiMarkCpp Requirements
    requirements:
      - id: ApiMarkCpp-CppGenerator-GenerateDocumentationFromCppHeaders
        title: ApiMarkCpp shall generate API documentation from C++ header files and
          their Doxygen doc comments.
        justification: |
          ApiMark needs to document C++ libraries from public header files without requiring
          a full build, using the headers for API structure and Doxygen doc comments for the
          developer-authored descriptions that belong in the markdown output.
        children:
          - ApiMarkCpp-CppGenerator-AcceptIncludeRootsAndParseOptions
          - ApiMarkCpp-CppGenerator-ParseHeadersViaClang
          - ApiMarkCpp-CppGenerator-FilterDeclarationsByOwnership
          - ApiMarkCpp-CppGenerator-EmitDetailPageForEveryMember
          - ApiMarkCpp-CppGenerator-ProduceConsistentOutputFileStructure
          - ApiMarkCpp-CppGenerator-EmitCombinedMemberPageForCaseInsensitiveCollisions
          - ApiMarkCpp-CppGenerator-FilterByVisibility
          - ApiMarkCpp-CppGenerator-IncludeDeprecatedApisWhenRequested
          - ApiMarkCpp-CppGenerator-RenderDoxygenDocComments
          - ApiMarkCpp-CppGenerator-ApiMdListsAllNamespacesWithTypeCount
          - ApiMarkCpp-CppGenerator-GroupOperatorOverloadsOnSinglePage
          - ApiMarkCpp-CppGenerator-ShowDirectInheritanceInTypeSignature
          - ApiMarkCpp-CppGenerator-EmitIntraDocLinksInTableCells
          - ApiMarkCpp-CppGenerator-ApplyGitignoreStylePatternSelectionToHeaders
          - ApiMarkCpp-CppGenerator-SupportAbsoluteHeaderPatterns
          - ApiMarkCpp-CppGenerator-WorkingDirectory
          - ApiMarkCpp-CppGenerator-RejectNullContext
          - ApiMarkCpp-CppGenerator-ShowDeletedFunctionsWithDeletedNotation
          - ApiMarkCpp-CppGenerator-DocumentTypeAliases
          - ApiMarkCpp-CppGenerator-EmitSingleFileOutput
          - ApiMarkCpp-CppAstModel
          - ApiMarkCpp-ClangAstParser
          - ApiMarkCpp-CppEmitter
          - ApiMarkCpp-CppEmitterGradualDisclosure
          - ApiMarkCpp-CppEmitterSingleFile
          - ApiMarkCpp-CppTypeLinkResolver
          - ApiMarkCpp-EmitExternalTypesSection
        tests: [CppGenerator_Generate_ValidHeaders_CreatesApiEntrypoint]
      - id: ApiMarkCpp-EmitExternalTypesSection
        title: ApiMarkCpp shall render unrecognized non-std type references in an External
          Types section on the affected page.
        justification: |
          When a documented type references a type outside the library and outside the
          C++ standard library, readers need a clear indication of the external dependency.
          The Cpp subsystem tracks these references during generation and emits a dedicated
          External Types section so that the dependency is visible in the generated output.
        children:
          - ApiMarkCpp-CppEmitter-RepresentExternalTypeInfo
          - ApiMarkCpp-CppTypeLinkResolver-LinkifyExternalTypeTracking
        tests: [CppGenerator_Generate_ExternalTypeReference_EmitsExternalTypesSection]
