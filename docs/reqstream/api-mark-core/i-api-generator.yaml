---
# IApiGenerator unit requirements
sections:
  - title: ApiMarkCore Requirements
    sections:
      - title: IApiGenerator Requirements
        requirements:
          - id: ApiMarkCore-IApiGenerator-DefineParseMethod
            title: >-
              IApiGenerator shall define a Parse method that accepts an IContext
              and returns an IApiEmitter representing the parsed component's
              documentation.
            justification: |
              The Parse method is the entry point for the first stage of the
              two-stage pipeline. Its signature must be uniform across all
              language implementations so that the CLI and MSBuild task can
              invoke any generator without knowing its concrete type.
            children:
              - ApiMarkCore-IApiGenerator-AcceptContextParameter
              - ApiMarkCore-IApiGenerator-ReturnIApiEmitter
              - ApiMarkCore-IApiGenerator-RejectNullContext
            tests:
              - IApiGenerator_Parse_WithMinimalStub_ExecutesSuccessfully
              - IApiGenerator_Parse_NullContext_ThrowsArgumentNullException
          - id: ApiMarkCore-IApiGenerator-AcceptContextParameter
            title: IApiGenerator.Parse shall accept an IContext parameter as the
              caller-supplied diagnostic channel for informational and error output.
            justification: |
              IContext decouples generators from Console so output can be captured,
              suppressed, or redirected by the caller without changing the generator
              implementation. The caller supplies an IContext reference that the
              generator uses for all diagnostic output during parsing.
            tests: [IApiGenerator_Parse_WithMinimalStub_ExecutesSuccessfully]
          - id: ApiMarkCore-IApiGenerator-ReturnIApiEmitter
            title: IApiGenerator.Parse shall return an IApiEmitter that holds all
              data required to emit the parsed component's documentation.
            justification: |
              Returning an IApiEmitter separates the I/O-heavy parsing phase from
              output-format selection, allowing the caller to choose the output format
              at emit time rather than at parse time. The returned emitter is
              format-agnostic; format selection is the responsibility of the caller
              when invoking IApiEmitter.Emit.
            tests: [ApiMarkCore_GeneratorContract_SupportedLanguage_CanBeInvoked]
          - id: ApiMarkCore-IApiGenerator-AllowConstructionTimeConfiguration
            title: IApiGenerator shall allow language-specific configuration to be
              supplied when an implementation is constructed before Parse is called.
            justification: |
              Language modules require different inputs and policies, such as input
              file paths or visibility settings, so configuration must be captured
              before parsing starts while keeping the runtime invocation uniform.
            tests: [IApiGenerator_Implementation_UsesConstructionConfiguration]
          - id: ApiMarkCore-IApiGenerator-RejectNullContext
            title: IApiGenerator.Parse shall reject a null context argument.
            justification: |
              Passing a null IContext to Parse would cause a NullReferenceException
              deep inside the generator implementation with no actionable message.
              Failing fast with ArgumentNullException at the entry point makes
              misconfiguration immediately diagnosable by the caller.
            tests: [IApiGenerator_Parse_NullContext_ThrowsArgumentNullException]
