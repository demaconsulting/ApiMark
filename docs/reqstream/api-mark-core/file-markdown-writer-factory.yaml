---
# FileMarkdownWriterFactory unit requirements
sections:
  - title: ApiMarkCore Requirements
    sections:
      - title: FileMarkdownWriterFactory Requirements
        requirements:
          - id: ApiMarkCore-FileMarkdownWriterFactory-RejectNullOutputDirectory
            title: FileMarkdownWriterFactory shall throw ArgumentException when constructed
              with a null output directory path.
            justification: |
              Failing fast at construction with a clear ArgumentException prevents
              obscure I/O failures later when the first file is created, making
              misconfiguration easier to diagnose than a deferred IOException.
            tests:
              - FileMarkdownWriterFactory_Constructor_NullDirectory_ThrowsArgumentException
          - id: ApiMarkCore-FileMarkdownWriterFactory-RejectEmptyOutputDirectory
            title: FileMarkdownWriterFactory shall throw ArgumentException when constructed
              with an empty string output directory path.
            justification: |
              An empty string cannot produce a valid directory path; failing fast at
              construction prevents obscure I/O failures later.
            tests:
              - FileMarkdownWriterFactory_Constructor_EmptyDirectory_ThrowsArgumentException
          - id: ApiMarkCore-FileMarkdownWriterFactory-RejectWhitespaceOutputDirectory
            title: FileMarkdownWriterFactory shall throw ArgumentException when constructed
              with a whitespace-only output directory path.
            justification: |
              A whitespace-only string cannot produce a valid directory path; failing fast
              at construction makes misconfiguration immediately diagnosable.
            tests:
              - FileMarkdownWriterFactory_Constructor_WhitespaceDirectory_ThrowsArgumentException
          - id: ApiMarkCore-FileMarkdownWriterFactory-RejectNullName
            title: FileMarkdownWriterFactory shall throw ArgumentException when CreateMarkdown
              is called with a null file name.
            justification: |
              A null name cannot produce a valid file path; failing at the call site
              produces a clear error immediately attributable to the misuse rather than
              an obscure downstream IOException.
            tests:
              - FileMarkdownWriterFactory_CreateMarkdown_NullName_ThrowsArgumentException
          - id: ApiMarkCore-FileMarkdownWriterFactory-RejectEmptyName
            title: FileMarkdownWriterFactory shall throw ArgumentException when CreateMarkdown
              is called with an empty string file name.
            justification: |
              An empty file name cannot produce a valid file path; failing at the call
              site produces a clear error immediately attributable to the misuse.
            tests:
              - FileMarkdownWriterFactory_CreateMarkdown_EmptyName_ThrowsArgumentException
          - id: ApiMarkCore-FileMarkdownWriterFactory-RejectWhitespaceName
            title: FileMarkdownWriterFactory shall throw ArgumentException when CreateMarkdown
              is called with a whitespace-only file name.
            justification: |
              A whitespace-only name cannot produce a valid file path; failing immediately
              prevents confusing downstream I/O errors.
            tests:
              - FileMarkdownWriterFactory_CreateMarkdown_WhitespaceName_ThrowsArgumentException
          - id: ApiMarkCore-FileMarkdownWriterFactory-SupportRootLevelFiles
            title: FileMarkdownWriterFactory shall create a file directly under the
              output root when CreateMarkdown is called with an empty or whitespace
              subFolder.
            justification: |
              The api.md entrypoint file is always at the root of the output tree.
              Accepting an empty or whitespace subFolder without error allows generators to create
              that fixed entrypoint without special-casing.
            tests: [FileMarkdownWriterFactory_CreateMarkdown_RootLevel_CreatesFile]
          - id: ApiMarkCore-FileMarkdownWriterFactory-CreateOutputDirectoryOnUse
            title: FileMarkdownWriterFactory shall create the output directory tree
              (including the subFolder) if it does not exist before returning the
              writer, so that callers do not need to pre-create directories.
            justification: |
              Language generators work with logical paths and must not be responsible
              for managing the physical directory tree; delegating directory creation
              to the factory keeps generators free of filesystem-management concerns.
            tests:
              - FileMarkdownWriterFactory_CreateMarkdown_NonExistentDirectory_CreatesDirectory
              - FileMarkdownWriterFactory_CreateMarkdown_WithSubFolder_CreatesDirectoryAndFile
