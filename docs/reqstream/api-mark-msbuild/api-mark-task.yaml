---
# ApiMarkTask unit requirements
sections:
  - title: ApiMarkMsbuild Requirements
    sections:
      - title: ApiMarkTask Requirements
        requirements:
          - id: ApiMarkMsbuild-ApiMarkTask-InferLanguageFromProjectType
            title: ApiMarkTask shall infer the documentation language from the project
              extension when ApiMarkLanguage is not explicitly set.
            justification: |
              Most projects do not need to set ApiMarkLanguage explicitly; convention-based
              inference removes boilerplate and makes the package easy to adopt for both
              .csproj and .vcxproj projects.
            tests:
              - ApiMarkTask_Language_InferredAsCpp_ForVcxproj
              - ApiMarkTask_Language_InferredAsDotNet_ForCsproj
          - id: ApiMarkMsbuild-ApiMarkTask-SpawnToolForDotNet
            title: ApiMarkTask shall spawn ApiMark.Tool with the dotnet subcommand
              and pass assembly and XML documentation paths for .NET builds.
            justification: |
              Out-of-process generation allows ApiMark.Tool to use net8.0 libraries that
              do not support netstandard2.0, keeping the MSBuild task thin and broadly
              compatible while enabling full .NET generator functionality.
            tests:
              - ApiMarkTask_DotNet_SpawnsToolWithCorrectAssemblyAndXmlDocArguments
              - ApiMarkTask_Execute_WithDotNetProject_GeneratesDocumentation
          - id: ApiMarkMsbuild-ApiMarkTask-SpawnToolForCpp
            title: ApiMarkTask shall spawn ApiMark.Tool with the cpp subcommand and
              pass include paths for C++ builds.
            justification: |
              ApiMark.Cpp invokes system clang and targets net8.0+; the out-of-process
              model is the only viable integration strategy for vcxproj builds run under
              .NET Framework MSBuild inside Visual Studio.
            tests: [ApiMarkTask_Cpp_SpawnsToolWithCorrectIncludePathArguments]
          - id: ApiMarkMsbuild-ApiMarkTask-ForwardOutputDirectoryProperty
            title: ApiMarkTask shall forward the ApiMarkOutputDir property to the
              tool as the --output argument.
            justification: |
              Build authors need to control where generated documentation is written so it
              fits their packaging, publishing, and CI artifact workflows.
            tests: [ApiMarkTask_OutputDir_ForwardedToToolAsOutputArgument]
          - id: ApiMarkMsbuild-ApiMarkTask-ForwardVisibilityProperty
            title: ApiMarkTask shall forward the ApiMarkVisibility property to the
              tool as the --visibility argument.
            justification: |
              MSBuild integration must expose the same public-surface filtering choices as
              the underlying generators so project files can select the intended audience.
            tests: [ApiMarkTask_Visibility_ForwardedToToolAsVisibilityArgument]
          - id: ApiMarkMsbuild-ApiMarkTask-SupportDisableProperty
            title: ApiMarkTask shall return success immediately without spawning the
              tool when DisableApiMark is true.
            justification: |
              Projects must be able to suppress generation in specific configurations
              (e.g., debug builds, CI environments without the SDK) without removing the
              NuGet package reference or breaking the build.
            tests: [ApiMarkTask_DisableApiMark_True_SkipsToolInvocation]
          - id: ApiMarkMsbuild-ApiMarkTask-ForwardIncludeObsoleteFlag
            title: ApiMarkTask shall forward the ApiMarkIncludeObsolete property to
              the tool as the --include-obsolete flag when true.
            justification: |
              Build authors need to opt in to including deprecated API surface in generated
              documentation without modifying the NuGet package reference or the build pipeline.
            tests: [ApiMarkTask_IncludeObsolete_True_ForwardsIncludeObsoleteFlag]
          - id: ApiMarkMsbuild-ApiMarkTask-ForwardCppLibraryName
            title: ApiMarkTask shall forward the ApiMarkLibraryName property to the
              tool as the --library-name argument for C++ builds.
            justification: |
              C++ projects need to set a human-readable library name that appears as the top-level
              heading in the generated api.md, independent of the project file name.
            tests: [ApiMarkTask_Cpp_LibraryName_ForwardedToTool]
          - id: ApiMarkMsbuild-ApiMarkTask-ForwardCppDefines
            title: >-
              ApiMarkTask shall forward the ApiMarkDefines property to the tool as
              the --defines
              argument for C++ builds, converting semicolons to commas.
            justification: |
              C++ projects rely on preprocessor defines (e.g. export macros) for correct parsing.
              MSBuild uses semicolons as its list separator; the tool expects commas, so the
              conversion must happen in the task before spawning the child process.
            tests: [ApiMarkTask_Cpp_Defines_SemicolonsConvertedToCommas]
          - id: ApiMarkMsbuild-ApiMarkTask-ForwardCppStandard
            title: ApiMarkTask shall forward the ApiMarkCppStandard property to the
              tool as the --cpp-standard argument for C++ builds.
            justification: |
              Different C++ projects target different language standards; the standard must be
              forwarded so the Clang parser interprets the headers under the same standard as
              the actual build.
            tests: [ApiMarkTask_Cpp_CppStandard_ForwardedToTool]
          - id: ApiMarkMsbuild-ApiMarkTask-SkipWhenCppIncludePathsNotSet
            title: >-
              ApiMarkTask shall return success immediately without spawning the tool
              when the
              language is cpp and ApiMarkIncludePaths is not set.
            justification: |
              C++ projects in a solution may not all be documentation targets. When
              ApiMarkIncludePaths is absent the task must skip gracefully rather than fail the
              build, parallel to the dotnet behavior when ApiMarkXmlDocPath is absent.
            tests: [ApiMarkTask_Cpp_EmptyIncludePaths_SkipsExecution]
          - id: ApiMarkMsbuild-ApiMarkTask-ForwardLibraryDescription
            title: ApiMarkTask shall forward the ApiMarkLibraryDescription property
              to the tool as the --library-description argument for C++ builds.
            justification: |
              C++ projects need to set a human-readable library description that appears in
              the generated api.md, independent of any project metadata. Forwarding the MSBuild
              property keeps the build configuration as the single source of truth.
            tests:
              - ApiMarkTask_BuildArguments_LibraryDescriptionWithDoubleQuote_PassedVerbatim
              - ApiMarkTask_Cpp_LibraryDescription_ForwardedToTool
          - id: ApiMarkMsbuild-ApiMarkTask-ForwardClangPath
            title: ApiMarkTask shall forward the ApiMarkClangPath property to the
              tool as the --clang-path argument for C++ builds when set.
            justification: |
              CI environments and multi-toolchain projects frequently have clang installed at a
              non-default path. Forwarding ApiMarkClangPath lets build authors specify the
              executable path without modifying system PATH, keeping the build reproducible.
            tests: [ApiMarkTask_Cpp_ClangPath_ForwardedToTool]
          - id: ApiMarkMsbuild-ApiMarkTask-AutoPopulateIncludePaths
            title: >-
              ApiMarkTask shall automatically populate ApiMarkIncludePaths from the
              AdditionalIncludeDirectories metadata on ClCompile items when ApiMarkIncludePaths
              is not explicitly set.
            justification: |
              vcxproj builds already declare their include directories via ClCompile
              AdditionalIncludeDirectories, often populated by NuGet packages. Harvesting
              this metadata automatically means C++ projects require no manual ApiMark
              configuration beyond the package reference.
            tests:
              - windows@ApiMarkMsbuild_NuGetPackage_CppVcxprojProject_AutoDocumentsOnBuild
          - id: ApiMarkMsbuild-ApiMarkTask-SkipWhenDotNetXmlDocPathNotSet
            title: >-
              ApiMarkTask shall return success immediately without spawning the tool
              when the
              language is dotnet and ApiMarkXmlDocPath is not set.
            justification: |
              .NET projects in a solution may not all have XML documentation generation
              enabled. When ApiMarkXmlDocPath is absent the task must skip gracefully rather
              than fail the build, parallel to the C++ behavior when ApiMarkIncludePaths is
              absent.
            tests: [ApiMarkTask_DotNet_EmptyXmlDocPath_SkipsExecution]
          - id: ApiMarkMsbuild-ApiMarkTask-ForwardApiHeaders
            title: >-
              ApiMarkTask shall forward each entry of ApiMarkApiHeaders to the tool
              as a separate
              --api-headers flag for C++ builds, preserving order and forwarding '!'-prefixed
              exclusion patterns verbatim.
            justification: |
              C++ projects need fine-grained, gitignore-style control over which headers contribute
              to the documented API surface. Forwarding each pattern as its own --api-headers flag
              preserves order and lets CppGenerator apply last-match-wins semantics correctly.
            tests: [ApiMarkTask_Cpp_ApiHeaders_ForwardedAsIndividualFlags]
          - id: ApiMarkMsbuild-ApiMarkTask-ForwardFormatProperty
            title: ApiMarkTask shall forward the ApiMarkFormat property to the tool
              as the --format argument.
            justification: |
              Build authors need to choose between gradual-disclosure output and single-file output
              without changing the command line in every project file.
            tests:
              - ApiMarkTask_Format_ForwardedToToolAsFormatArgument
              - ApiMarkTask_Format_NotForwarded_WhenNotSet
          - id: ApiMarkMsbuild-ApiMarkTask-SupportOutputsItemGroup
            title: >-
              ApiMarkTask shall generate documentation for each item in the
              ApiMarkOutputs ItemGroup when it is non-empty.
            justification: |
              Projects that need multiple output formats or visibility levels from a single build
              must be able to declare named outputs via the ApiMarkOutputs ItemGroup, each carrying
              its own OutputDir, Format, and Visibility metadata, so that the task produces
              distinct documentation artifacts without requiring separate build invocations.
            tests:
              - ApiMarkTask_BuildArgumentsForOutput_OverridesScalarPropertiesFromMetadata
              - ApiMarkTask_BuildArgumentsForOutput_RestoresScalarPropertiesAfterCall
          - id: ApiMarkMsbuild-ApiMarkTask-OverrideOutputProperties
            title: >-
              ApiMarkTask shall override OutputDir, Visibility, and Format from each
              ApiMarkOutputs item's metadata when building arguments for that output.
            justification: |
              Each named output in the ApiMarkOutputs ItemGroup must be able to specify its own
              output directory, visibility level, and format independently so that a single build
              invocation can produce multiple distinct documentation artifacts.
            tests:
              - ApiMarkTask_BuildArgumentsForOutput_OverridesScalarPropertiesFromMetadata
          - id: ApiMarkMsbuild-ApiMarkTask-RestoreOutputProperties
            title: >-
              ApiMarkTask shall restore the original OutputDir, Visibility, and Format
              values after building arguments for each output item.
            justification: |
              Scalar property values must be restored after each per-output invocation so that
              subsequent items and the scalar invocation path continue to use the original
              project-level property values, avoiding cross-contamination between outputs.
            tests:
              - ApiMarkTask_BuildArgumentsForOutput_RestoresScalarPropertiesAfterCall
          - id: ApiMarkMsbuild-ApiMarkTask-ResolveDotNetExecutable
            title: >-
              ApiMarkTask shall locate the dotnet executable by checking DOTNET_HOST_PATH
              first and then searching PATH, and shall return false with an error if neither
              source provides a valid executable path.
            justification: |
              The .NET SDK sets DOTNET_HOST_PATH to the exact dotnet host; preferring it over
              PATH avoids confusion when multiple SDK versions are installed. Failing fast with
              a clear error prevents a silent no-op build when the SDK is absent.
            tests:
              - ApiMarkTask_Execute_ToolExitsNonZero_ReturnsFalseAndLogsError
          - id: ApiMarkMsbuild-ApiMarkTask-SurfaceToolExitCode
            title: >-
              ApiMarkTask shall return false and log a MSBuild error when the spawned
              ApiMark.Tool process exits with a non-zero exit code.
            justification: |
              MSBuild builds must fail visibly when documentation generation fails. Returning
              false from Execute causes MSBuild to mark the target as failed and stop the build,
              while the logged error message identifies the exit code for diagnosis.
            tests:
              - ApiMarkTask_Execute_ToolExitsNonZero_ReturnsFalseAndLogsError
          - id: ApiMarkMsbuild-ApiMarkTask-ForwardStdoutToLog
            title: >-
              ApiMarkTask shall forward the spawned tool's standard output to the MSBuild
              build log as informational messages.
            justification: |
              ApiMark.Tool writes progress and status to stdout. Forwarding it to the MSBuild
              log makes generation progress visible in the IDE output window and CI build logs.
            tests: []
