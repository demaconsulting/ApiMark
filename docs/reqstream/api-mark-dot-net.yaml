---
# ApiMarkDotNet system-level requirements
sections:
  - title: ApiMarkDotNet Requirements
    requirements:
      - id: ApiMarkDotNet-GenerateDocumentationFromAssembliesAndXml
        title: ApiMarkDotNet shall generate API documentation from .NET assemblies
          and XML documentation files.
        justification: |
          ApiMark needs to document compiled .NET libraries without requiring source
          code access, using the assembly for API structure and the XML file for the
          developer-authored descriptions that belong in the markdown output.
        children:
          - ApiMarkDotNet-DotNetGenerator-AcceptAssemblyAndXmlInputs
          - ApiMarkDotNet-DotNetGenerator-ReadAssemblyMetadataWithoutLoading
          - ApiMarkDotNet-DotNetGenerator-ReadXmlDocumentationComments
          - ApiMarkDotNet-DotNetGenerator-FilterByVisibility
          - ApiMarkDotNet-DotNetGenerator-IncludeObsoleteApisWhenRequested
          - ApiMarkDotNet-DotNetGenerator-RecognizeNamespaceDocCarrierClass
          - ApiMarkDotNet-DotNetGenerator-ExcludeNamespaceDocCarrierFromTypeListing
          - ApiMarkDotNet-DotNetGenerator-UseNamespaceDocSummaryAsNamespaceDescription
          - ApiMarkDotNet-DotNetGenerator-RejectMissingAssemblyPath
          - ApiMarkDotNet-DotNetGenerator-RejectMissingXmlDocPath
          - ApiMarkDotNet-DotNetGenerator-RejectNullOptions
          - ApiMarkDotNet-DotNetGenerator-RejectNullContext
          - ApiMarkDotNet-DotNetGenerator-BuildInheritanceChainForInheritDoc
          - ApiMarkDotNet-DotNetAstModel-HoldParsedAssemblyData
          - ApiMarkDotNet-DotNetEmitter-DispatchToFormatSpecificEmitter
          - ApiMarkDotNet-DotNetEmitter-RejectNullArguments
          - ApiMarkDotNet-DotNetEmitter-ComputeNamespaceFolderPath
          - ApiMarkDotNet-DotNetEmitter-ShowDirectInheritanceInTypeSignature
          - ApiMarkDotNet-DotNetEmitter-EmitOperatorsPageWithSymbolHeadings
          - ApiMarkDotNet-DotNetEmitter-EmitConversionOperators
          - ApiMarkDotNet-DotNetEmitter-EmitConversionOperatorsWithConversionSyntax
          - ApiMarkDotNet-DotNetEmitter-RenderClassModifiersInTypeSignature
          - ApiMarkDotNet-DotNetEmitter-RenderInitOnlyPropertyAccessor
          - ApiMarkDotNet-DotNetEmitterGradualDisclosure-EmitApiIndexPage
          - ApiMarkDotNet-DotNetEmitterGradualDisclosure-EmitNamespacePages
          - ApiMarkDotNet-DotNetEmitterGradualDisclosure-EmitTypePages
          - ApiMarkDotNet-DotNetEmitterGradualDisclosure-EmitMemberDetailPages
          - ApiMarkDotNet-DotNetEmitterGradualDisclosure-EmitCombinedPageForCaseCollisions
          - ApiMarkDotNet-DotNetEmitterGradualDisclosure-EmitMethodOverloadPage
          - ApiMarkDotNet-DotNetEmitterGradualDisclosure-EmitOperatorsPage
          - ApiMarkDotNet-DotNetEmitterGradualDisclosure-EmitNestedTypePages
          - ApiMarkDotNet-DotNetEmitterGradualDisclosure-EmitOperatorsSummaryDocumentation
          - ApiMarkDotNet-DotNetEmitterSingleFile-EmitAllApiIntoSingleFile
          - ApiMarkDotNet-DotNetEmitterSingleFile-OffsetHeadingsByHeadingDepth
          - ApiMarkDotNet-DotNetEmitterSingleFile-EmitAssemblyDescription
          - ApiMarkDotNet-DotNetEmitterSingleFile-EmitNamespaceDocSummary
          - ApiMarkDotNet-DotNetEmitterSingleFile-EmitCompactMemberBulletList
          - ApiMarkDotNet-DotNetEmitterSingleFile-EmitMembersConstructorsFirst
          - ApiMarkDotNet-DotNetEmitterSingleFile-SkipMemberListForDelegates
          - ApiMarkDotNet-DotNetEmitterSingleFile-EmitNestedTypeParentNotice
          - ApiMarkDotNet-DotNetEmitterSingleFile-EmitPlainTextParameterTypes
          - ApiMarkDotNet-TypeLinkResolver-ResolveIntraAssemblyTypesToMarkdownLinks
          - ApiMarkDotNet-TypeLinkResolver-ResolvePrimitiveAndSystemTypesToPlainText
          - ApiMarkDotNet-TypeLinkResolver-TrackNonSystemExternalTypesForExternalTypesSection
          - ApiMarkDotNet-TypeLinkResolver-RenderArrayTypesWithSuffix
          - ApiMarkDotNet-TypeLinkResolver-RenderGenericTypesWithTypeArguments
          - ApiMarkDotNet-TypeLinkResolver-UnwrapNullableValueTypes
          - ApiMarkDotNet-XmlDocReader-ParseAndIndexXmlDocumentation
          - ApiMarkDotNet-XmlDocReader-InheritDoc
        tests: [ApiMarkDotNet_Generate_ValidAssemblyAndXml_ProducesMarkdown]
      - id: ApiMarkDotNet-TypeNameSimplifier-ProduceReadableTypeNames
        title: ApiMarkDotNet shall render .NET type names in a concise C#-style form
          that is readable in generated documentation.
        justification: |
          Raw CLR type names are noisy and difficult to read, so the .NET system needs
          a consistent simplification policy that keeps signatures compact for both
          developers and AI consumers.
        children:
          - ApiMarkDotNet-TypeNameSimplifier-SimplifyPrimitiveAliases
          - ApiMarkDotNet-TypeNameSimplifier-SimplifyArrayTypes
          - ApiMarkDotNet-TypeNameSimplifier-RenderNullableValueTypesWithQuestionMark
          - ApiMarkDotNet-TypeNameSimplifier-SimplifyWellKnownNamespaces
          - ApiMarkDotNet-TypeNameSimplifier-SimplifyContextNamespaceTypes
          - ApiMarkDotNet-TypeNameSimplifier-SimplifyGenericArgumentsRecursively
          - ApiMarkDotNet-TypeNameSimplifier-AppendNullableReferenceSuffix
        tests: [ApiMarkDotNet_TypeNames_CommonSignatures_RenderReadably]
