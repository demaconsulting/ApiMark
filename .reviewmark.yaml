---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following hierarchical scope principles.
# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - README.md  # Root README file
  - requirements.yaml  # Root requirements file
  - '**/*.cs'  # All C# source and test files
  - docs/reqstream/**/*.yaml  # Requirements files
  - docs/design/**/*.md  # Design documentation files
  - docs/verification/**/*.md  # Verification documentation files
  - docs/user_guide/**/*.md  # User guide documentation
  - '!**/obj/**'  # Exclude build output
  - '!**/bin/**'  # Exclude build output
  - '!**/generated/**'  # Exclude generated output
evidence-source:
  type: none
reviews:
  # Purpose
  - id: ApiMark-Purpose
    title: Review that Advertised Features Match System Design
    paths:
      - README.md
      - requirements.yaml
      - docs/user_guide/**/*.md
      - docs/design/introduction.md
      - docs/verification/introduction.md

  # ApiMarkCore - Specials
  - id: ApiMark-Core-Architecture
    title: Review that ApiMark Core Architecture Satisfies Requirements
    paths:
      - docs/reqstream/api-mark-core.yaml
      - docs/design/introduction.md
      - docs/design/api-mark-core.md
      - docs/verification/introduction.md
      - docs/verification/api-mark-core.md
  - id: ApiMark-Core-AllRequirements
    title: Review that All ApiMark Core Requirements are Complete
    paths:
      - docs/reqstream/api-mark-core.yaml
      - docs/reqstream/api-mark-core/**/*.yaml
  - id: ApiMark-Core-Design
    title: Review that ApiMark Core Design is Consistent and Complete
    paths: [docs/design/api-mark-core.md, docs/design/api-mark-core/**/*.md]
  - id: ApiMark-Core-Verification
    title: Review that ApiMark Core Verification is Consistent and Complete
    paths:
      - docs/verification/api-mark-core.md
      - docs/verification/api-mark-core/**/*.md
  - id: ApiMark-Core-TestHelpers
    title: Review that ApiMark Core TestHelpers Implementation is Correct
    paths:
